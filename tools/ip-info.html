    <style>
        :root {
            --primary: #3b82f6;
            --primary-light: #eff6ff;
            --primary-dark: #1e40af;
            --success: #10b981;
            --danger: #ef4444;
            --border: #e5e7eb;

        * {

        body {

            background: var(--bg);

        .header {
            background: white;

            display: flex;
            align-items: center;

            color: var(--primary);

        .logo svg {
            width: 24px;
            height: 24px;

        .nav {
            display: flex;
            gap: 2rem;
        }

        .nav a {
            color: var(--text);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav a:hover {
            color: var(--primary);
        }

        .container {
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        .ad-top {
            background: #f0f0f0;
            border: 1px solid var(--border);
            padding: 2rem;
            border-radius: 0.5rem;
            margin-bottom: 2rem;
            text-align: center;
            color: var(--text-light);
            font-size: 0.875rem;
        }

        .tool-section {
            background: white;
            border-radius: 0.5rem;
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border);
        }

        .tool-section h2 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: var(--primary-dark);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text);
        }

        input[type="text"],
        input[type="number"],
        textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 0.375rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.875rem;
            transition: border-color 0.2s;

        input[type="text"]:focus,
        input[type="number"]:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.375rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            font-family: 'Inter', sans-serif;
        }

        button:hover {
            background: var(--primary-dark);
        }

        .button-group {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .info-card {
            background: var(--primary-light);
            border-left: 4px solid var(--primary);
            padding: 1rem;
            border-radius: 0.375rem;
            margin-bottom: 1rem;
        }

        .info-card label {
            margin-bottom: 0.25rem;
            font-size: 0.875rem;
            color: var(--text-light);
        }

        .info-card .value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem;
            color: var(--text);
            word-break: break-all;
            font-weight: 500;
        }

        .tag {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 0.25rem;
            font-size: 0.75rem;
            font-weight: 600;
            margin-right: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .tag-private {
            background: #fecaca;
            color: #991b1b;
        }

        .tag-public {
            background: #bbf7d0;
            color: #065f46;
        }

        .tag-ipv4 {
            background: #bfdbfe;
            color: #1e40af;
        }

        .results {
            margin-top: 2rem;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        @media (max-width: 768px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }

            .header-inner {
                flex-direction: column;
                gap: 1rem;
            }

            .nav {
                gap: 1rem;
            }
        }

        .copy-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.25rem 0.75rem;
            border-radius: 0.25rem;
            font-size: 0.75rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .copy-btn:hover {
            background: var(--primary-dark);
        }

        .success-text {
            color: var(--success);
            font-weight: 500;
        }

        .error-text {
            color: var(--danger);
            font-weight: 500;
        }

        .subnet-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
            font-size: 0.875rem;
        }

        .subnet-table th,
        .subnet-table td {
            border: 1px solid var(--border);
            padding: 0.5rem;
            text-align: left;
        }

        .subnet-table th {
            background: var(--primary-light);
            font-weight: 600;
        }

        .subnet-table td {
            font-family: 'JetBrains Mono', monospace;
        }

        .footer {
            background: white;
            border-top: 1px solid var(--border);
            padding: 2rem;
            margin-top: 2rem;
            text-align: center;
            color: var(--text-light);
            font-size: 0.875rem;
        }

        .toast {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            background: var(--text);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 0.375rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            animation: slideIn 0.3s ease-out;
            z-index: 1000;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <a href="../index.html" class="logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/>
                </svg>
                ToolBox
            </a>
            <nav class="nav">
                <a href="../index.html">ホーム</a>
                <a href="../index.html#tools">ツール一覧</a>
            </nav>
        </div>
    </header>

    <div class="container">
        <div class="ad-top">
            📢 広告スペース
        </div>

        <div class="tool-section">
            <h2>IPアドレス情報</h2>

            <div class="form-group">
                <label for="currentIp">現在のIPアドレス</label>
                <div class="button-group">
                    <input type="text" id="currentIp" placeholder="取得中..." readonly>
                    <button onclick="copyToClipboard('currentIp')">コピー</button>
                </div>
            </div>

            <div class="form-group">
                <label for="manualIp">IPアドレスを入力（手動検索）</label>
                <input type="text" id="manualIp" placeholder="例: 192.168.1.1 または 8.8.8.8">
                <button onclick="analyzeIP()" style="margin-top: 0.5rem;">分析</button>
            </div>

            <div id="ipResults"></div>

            <h2 style="margin-top: 2rem;">サブネット計算機</h2>
            <div class="form-group">
                <label for="subnetIp">IPアドレス</label>
                <input type="text" id="subnetIp" placeholder="例: 192.168.1.0">
            </div>
            <div class="form-group">
                <label for="cidrPrefix">CIDR プレフィックス</label>
                <input type="number" id="cidrPrefix" placeholder="例: 24" min="0" max="32">
                <button onclick="calculateSubnet()" style="margin-top: 0.5rem;">計算</button>
            </div>

            <div id="subnetResults"></div>
        </div>

        <div class="ad-top">
            📢 広告スペース
        </div>
    </div>

    <footer class="footer">
    <div class="footer-inner">
        <div class="footer-links">
            <a href="../index.html">ホーム</a>
            <a href="../index.html#tools">ツール一覧</a>
            <a href="../about.html">このサイトについて</a>
            <a href="../contact.html">お問い合わせ</a>
            <a href="../privacy.html">プライバシーポリシー</a>
            <a href="../terms.html">利用規約</a>
        </div>
        <p>&copy; 2026 ToolBox. All rights reserved.</p>
    </div>
</footer>

    <script>
        // Fetch current IP on page load
        window.addEventListener('load', async () => {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                document.getElementById('currentIp').value = data.ip;
            } catch (error) {
                document.getElementById('currentIp').value = 'Error fetching IP';
            }
        });

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function copyToClipboard(elementId) {
            const element = document.getElementById(elementId);
            navigator.clipboard.writeText(element.value).then(() => {
                showToast('コピーしました！');
            });
        }

        function ipToDecimal(ip) {
            const parts = ip.split('.');
            if (parts.length !== 4) return null;
            return parts.reduce((acc, part) => {
                const num = parseInt(part, 10);
                if (isNaN(num) || num < 0 || num > 255) return null;
                return (acc << 8) + num;
            }, 0);
        }

        function decimalToIp(decimal) {
            return [
                (decimal >>> 24) & 255,
                (decimal >>> 16) & 255,
                (decimal >>> 8) & 255,
                decimal & 255
            ].join('.');
        }

        function ipToBinary(ip) {
            const parts = ip.split('.');
            return parts.map(p => {
                const num = parseInt(p, 10);
                return num.toString(2).padStart(8, '0');
            }).join('.');
        }

        function getIpClass(ip) {
            const firstOctet = parseInt(ip.split('.')[0], 10);
            if (firstOctet < 128) return 'A';
            if (firstOctet < 192) return 'B';
            if (firstOctet < 224) return 'C';
            if (firstOctet < 240) return 'D';
            return 'E';
        }

        function isPrivateIP(ip) {
            const decimal = ipToDecimal(ip);
            if (decimal === null) return false;
            return (decimal >= ipToDecimal('10.0.0.0') && decimal <= ipToDecimal('10.255.255.255')) ||
                   (decimal >= ipToDecimal('172.16.0.0') && decimal <= ipToDecimal('172.31.255.255')) ||
                   (decimal >= ipToDecimal('192.168.0.0') && decimal <= ipToDecimal('192.168.255.255'));
        }

        function analyzeIP() {
            const ip = document.getElementById('manualIp').value.trim();
            const resultsDiv = document.getElementById('ipResults');

            if (!ip) {
                resultsDiv.innerHTML = '<p class="error-text">IPアドレスを入力してください。</p>';
                return;
            }

            const decimal = ipToDecimal(ip);
            if (decimal === null) {
                resultsDiv.innerHTML = '<p class="error-text">無効なIPアドレスです。</p>';
                return;
            }

            const isPrivate = isPrivateIP(ip);
            const ipClass = getIpClass(ip);
            const binary = ipToBinary(ip);

            resultsDiv.innerHTML = `
                <div class="results">
                    <div class="info-card">
                        <label>IPアドレス</label>
                        <div class="value">${ip}</div>
                    </div>
                    <div class="info-card">
                        <label>バイナリ表現</label>
                        <div class="value">${binary}</div>
                    </div>
                    <div class="grid-2">
                        <div class="info-card">
                            <label>IPクラス</label>
                            <div class="value">${ipClass}</div>
                        </div>
                        <div class="info-card">
                            <label>タイプ</label>
                            <div class="value">
                                <span class="tag ${isPrivate ? 'tag-private' : 'tag-public'}">
                                    ${isPrivate ? 'プライベート' : 'パブリック'}
                                </span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function calculateSubnet() {
            const ip = document.getElementById('subnetIp').value.trim();
            const cidr = parseInt(document.getElementById('cidrPrefix').value, 10);
            const resultsDiv = document.getElementById('subnetResults');

            if (!ip || isNaN(cidr) || cidr < 0 || cidr > 32) {
                resultsDiv.innerHTML = '<p class="error-text">有効なIPアドレスとCIDRプレフィックスを入力してください。</p>';
                return;
            }

            const decimal = ipToDecimal(ip);
            if (decimal === null) {
                resultsDiv.innerHTML = '<p class="error-text">無効なIPアドレスです。</p>';
                return;
            }

            const mask = (0xffffffff << (32 - cidr)) >>> 0;
            const hostBits = 32 - cidr;
            const networkDec = decimal & mask;
            const broadcastDec = networkDec | (~mask >>> 0);
            const hostCount = Math.pow(2, hostBits);
            const usableHosts = hostCount - 2;

            const networkAddr = decimalToIp(networkDec);
            const broadcastAddr = decimalToIp(broadcastDec);
            const firstHost = cidr === 31 ? decimalToIp(networkDec) : decimalToIp(networkDec + 1);
            const lastHost = cidr === 31 ? decimalToIp(broadcastDec) : decimalToIp(broadcastDec - 1);

            resultsDiv.innerHTML = `
                <div class="results">
                    <div class="grid-2">
                        <div class="info-card">
                            <label>ネットワークアドレス</label>
                            <div class="value">${networkAddr}</div>
                        </div>
                        <div class="info-card">
                            <label>ブロードキャストアドレス</label>
                            <div class="value">${broadcastAddr}</div>
                        </div>
                    </div>
                    <div class="grid-2">
                        <div class="info-card">
                            <label>最初の利用可能ホスト</label>
                            <div class="value">${firstHost}</div>
                        </div>
                        <div class="info-card">
                            <label>最後の利用可能ホスト</label>
                            <div class="value">${lastHost}</div>
                        </div>
                    </div>
                    <div class="grid-2">
                        <div class="info-card">
                            <label>ホスト数</label>
                            <div class="value">${hostCount}</div>
                        </div>
                        <div class="info-card">
                            <label>利用可能ホスト数</label>
                            <div class="value">${usableHosts}</div>
                        </div>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
