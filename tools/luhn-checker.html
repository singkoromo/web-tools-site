<body>
    <header class="header">
        <div class="header-inner">
            <a href="../index.html" class="logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">

            </a>
            <nav class="nav">
                <a href="../index.html">ホーム</a>
                <a href="../index.html#tools">ツール一覧</a>
            </nav>
        </div>
    </header>

    <div class="tool-container">
        <h1 class="tool-title">クレジットカード番号チェック</h1>

        <div class="warning-box">
            ⚠️ <strong>このツールはカード番号の形式チェック専用です。</strong> 実際のカード番号を入力しないでください。開発・テスト用途でのみ使用してください。
        </div>

        <div class="ad-banner">
            広告スペース
        </div>

        <div class="controls">
            <div class="control-group">
                <label class="control-label">カード番号</label>
                <input type="text" id="cardInput" placeholder="0000 0000 0000 0000" maxlength="23">
            </div>

            <div class="button-group">
                <button class="btn-primary" onclick="validateCard()">チェック</button>
                <button class="btn-secondary" onclick="clearInput()">クリア</button>
            </div>
        </div>

        <div class="test-numbers">
            <div class="test-title">📋 テスト用ダミーナンバー (開発・テスト専用)</div>
            <div class="test-items">
                <div class="test-item">
                    <div class="test-item-label">Visa</div>
                    <div>4532015112830366</div>
                    <button class="btn-secondary btn-small" style="margin-top: 8px; padding: 4px 8px; font-size: 11px;" onclick="useTestNumber('4532015112830366')">使用</button>
                </div>
                <div class="test-item">
                    <div class="test-item-label">MasterCard</div>
                    <div>5425233010103442</div>
                    <button class="btn-secondary btn-small" style="margin-top: 8px; padding: 4px 8px; font-size: 11px;" onclick="useTestNumber('5425233010103442')">使用</button>
                </div>
                <div class="test-item">
                    <div class="test-item-label">American Express</div>
                    <div>374245455400126</div>
                    <button class="btn-secondary btn-small" style="margin-top: 8px; padding: 4px 8px; font-size: 11px;" onclick="useTestNumber('374245455400126')">使用</button>
                </div>
                <div class="test-item">
                    <div class="test-item-label">JCB</div>
                    <div>3530111333300000</div>
                    <button class="btn-secondary btn-small" style="margin-top: 8px; padding: 4px 8px; font-size: 11px;" onclick="useTestNumber('3530111333300000')">使用</button>
                </div>
            </div>
        </div>

        <div class="results" id="results"></div>
    </div>

    <div class="ad-banner">
        広告スペース
    </div>

    <footer>
        © 2026 ToolBox. All rights reserved.
    </footer>

    <div class="toast" id="toast"></div>

    <script>
        function luhnCheck(cardNumber) {
            let sum = 0;
            let isEven = false;

            for (let i = cardNumber.length - 1; i >= 0; i--) {
                let digit = parseInt(cardNumber[i], 10);

                if (isEven) {
                    digit *= 2;
                    if (digit > 9) {
                        digit -= 9;
                    }
                }

                sum += digit;
                isEven = !isEven;
            }

            return sum % 10 === 0;
        }

        function getCardBrand(cardNumber) {
            const patterns = {
                visa: /^4[0-9]{12}(?:[0-9]{3})?$/,
                mastercard: /^(?:5[1-5][0-9]{2}|222[1-9]|22[3-9][0-9]|2[3-6][0-9]{2}|27[01][0-9]|2720)[0-9]{12}$/,
                amex: /^3[47][0-9]{13}$/,
                jcb: /^(?:2131|1800|35\d{3})\d{11}$/,
                diners: /^3(?:0[0-5]|[68][0-9])[0-9]{11}$/
            };

            for (const [brand, pattern] of Object.entries(patterns)) {
                if (pattern.test(cardNumber)) {
                    return brand;
                }
            }

            return null;
        }

        function getBrandInfo(brand) {
            const info = {
                visa: { ja: 'Visa', icon: 'VI' },
                mastercard: { ja: 'MasterCard', icon: 'MC' },
                amex: { ja: 'American Express', icon: 'AX' },
                jcb: { ja: 'JCB', icon: 'JCB' },
                diners: { ja: 'Diners Club', icon: 'DC' }
            };
            return info[brand] || { ja: '不明', icon: '?' };
        }

        function formatCardNumber(number) {
            return number.replace(/\s+/g, '').replace(/(\d{4})/g, '$1 ').trim();
        }

        function validateCard() {
            const input = document.getElementById('cardInput').value.trim();
            const cardNumber = input.replace(/\s+/g, '');
            const resultsDiv = document.getElementById('results');

            if (!cardNumber) {
                resultsDiv.innerHTML = '<div class="empty-state">カード番号を入力してください</div>';
                return;
            }

            if (!/^\d+$/.test(cardNumber)) {
                resultsDiv.innerHTML = '<div class="empty-state">カード番号は数字のみで構成されている必要があります</div>';
                return;
            }

            if (cardNumber.length < 13 || cardNumber.length > 19) {
                resultsDiv.innerHTML = '<div class="empty-state">カード番号は13～19桁である必要があります</div>';
                return;
            }

            const isValid = luhnCheck(cardNumber);
            const brand = getCardBrand(cardNumber);
            const brandInfo = getBrandInfo(brand);

            const resultBox = document.createElement('div');
            resultBox.className = 'result-box';

            const statusClass = isValid ? 'valid' : 'invalid';
            const statusIcon = isValid ? '✓' : '✗';
            const statusLabel = isValid ? '有効' : '無効';

            resultBox.innerHTML = `
                <div class="result-status">
                    <div class="status-icon ${statusClass}">${statusIcon}</div>
                    <div class="status-text">
                        <div class="status-label">Luhn検証: ${statusLabel}</div>
                        <div class="status-value">このカード番号は${statusLabel === '有効' ? 'Luhnアルゴリズムのチェックに' : 'Luhnアルゴリズムのチェックに'}合致しています</div>
                    </div>
                </div>

                <div class="result-details">
                    <div class="detail-row">
                        <span class="detail-label">カード番号</span>
                        <span class="detail-value">${formatCardNumber(cardNumber)}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">カード種別</span>
                        <span class="detail-value">
                            <div class="card-brand">
                                <span class="card-icon">${brandInfo.icon}</span>
                                ${brand ? brandInfo.ja : '判定不可'}
                            </div>
                        </span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">桁数</span>
                        <span class="detail-value">${cardNumber.length}桁</span>
                    </div>
                </div>
            `;

            resultsDiv.innerHTML = '';
            resultsDiv.appendChild(resultBox);
        }

        function useTestNumber(number) {
            document.getElementById('cardInput').value = formatCardNumber(number);
            validateCard();
            showToast('テスト用番号を使用しました');
        }

        function clearInput() {
            document.getElementById('cardInput').value = '';
            document.getElementById('results').innerHTML = '';
            showToast('クリアしました');
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        // Format input as user types
        document.getElementById('cardInput').addEventListener('input', (e) => {
            let value = e.target.value.replace(/\s+/g, '');
            let formatted = '';
            for (let i = 0; i < value.length; i++) {
                if (i > 0 && i % 4 === 0) {
                    formatted += ' ';
                }
                formatted += value[i];
            }
            e.target.value = formatted;
        });

        // Enter key to validate
        document.getElementById('cardInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                validateCard();
            }
        });
    </script>
</body>
