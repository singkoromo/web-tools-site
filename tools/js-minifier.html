    <style>
        .tool-wrapper { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-bottom: 2rem; }
        .code-section { display: flex; flex-direction: column; gap: 1rem; }
        .code-label { font-weight: 600; color: #333; }
        textarea { font-family: 'JetBrains Mono', monospace; font-size: 14px; padding: 1rem; border: 1px solid #ddd; border-radius: 8px; resize: vertical; min-height: 400px; background: #f9f9f9; }
        .button-group { display: flex; gap: 1rem; }
        button { padding: 0.75rem 1.5rem; border: none; border-radius: 6px; cursor: pointer; font-weight: 500; transition: all 0.2s; }
        .btn-format { background: #4CAF50; color: white; }
        .btn-format:hover { background: #45a049; }
        .btn-minify { background: #2196F3; color: white; }
        .btn-minify:hover { background: #0b7dda; }
        .btn-copy { background: #FF9800; color: white; }
        .btn-copy:hover { background: #e68900; }
        .stats { padding: 1rem; background: #f0f0f0; border-radius: 6px; margin-top: 1rem; font-size: 14px; }
        .stat-item { margin: 0.5rem 0; }
        .ratio { color: #2196F3; font-weight: 600; }
        @media (max-width: 1024px) {
            .tool-wrapper { grid-template-columns: 1fr; }
        }
    </style>

<body>
    <header class="header">
        <div class="header-inner">
            <a href="../index.html" class="logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/>
                </svg>
                ToolBox
            </a>
            <nav class="nav">
                <a href="../index.html">ホーム</a>
                <a href="../index.html#tools">ツール一覧</a>
            </nav>
        </div>
    </header>

    <div class="ad-banner">
        <div class="ad-placeholder">広告スペース（Google AdSense）</div>
    </div>

    <div class="tool-page">
        <div class="tool-container">
            <h1>JavaScript整形・圧縮</h1>
            <p>JavaScriptコードを整形または圧縮します。</p>

            <div class="tool-wrapper">
                <div class="code-section">
                    <label class="code-label">入力JavaScript</label>
                    <textarea id="inputJS" placeholder="JavaScriptコードを入力してください..."></textarea>
                </div>
                <div class="code-section">
                    <label class="code-label">出力</label>
                    <textarea id="outputJS" placeholder="出力結果がここに表示されます..." readonly></textarea>
                </div>
            </div>

            <div class="button-group">
                <button class="btn-format" onclick="formatJS()">整形</button>
                <button class="btn-minify" onclick="minifyJS()">圧縮</button>
                <button class="btn-copy" onclick="copyOutput()">コピー</button>
            </div>

            <div class="stats">
                <div class="stat-item">入力サイズ: <span id="inputSize">0</span> bytes</div>
                <div class="stat-item">出力サイズ: <span id="outputSize">0</span> bytes</div>
                <div class="stat-item">圧縮率: <span class="ratio" id="ratio">0%</span></div>
            </div>
        </div>
    </div>

    <div class="ad-banner">
        <div class="ad-placeholder">広告スペース（Google AdSense）</div>
    </div>

    <footer class="footer">
    <div class="footer-inner">
        <div class="footer-links">
            <a href="../index.html">ホーム</a>
            <a href="../index.html#tools">ツール一覧</a>
            <a href="../about.html">このサイトについて</a>
            <a href="../contact.html">お問い合わせ</a>
            <a href="../privacy.html">プライバシーポリシー</a>
            <a href="../terms.html">利用規約</a>
        </div>
        <p>&copy; 2026 ToolBox. All rights reserved.</p>
    </div>
</footer>

    <div class="toast" id="toast"></div>

    <script>
        const inputJS = document.getElementById('inputJS');
        const outputJS = document.getElementById('outputJS');

        inputJS.addEventListener('input', updateStats);

        function updateStats() {
            const inputSize = new Blob([inputJS.value]).size;
            const outputSize = new Blob([outputJS.value]).size;
            document.getElementById('inputSize').textContent = inputSize;
            document.getElementById('outputSize').textContent = outputSize;
            if (outputSize > 0) {
                const ratio = Math.round(((inputSize - outputSize) / inputSize) * 100);
                document.getElementById('ratio').textContent = ratio + '%';
            } else {
                document.getElementById('ratio').textContent = '0%';
            }
        }

        function formatJS() {
            let js = inputJS.value.trim();
            if (!js) {
                showToast('JavaScriptコードを入力してください');
                return;
            }

            // Remove single-line comments but preserve code
            js = js.replace(/\/\/.*$/gm, '');
            // Remove multi-line comments
            js = js.replace(/\/\*[\s\S]*?\*\//g, '');

            let formatted = '';
            let indentLevel = 0;
            let inString = false;
            let stringChar = '';

            for (let i = 0; i < js.length; i++) {
                const char = js[i];
                const nextChar = js[i + 1];

                // Track string state
                if ((char === '"' || char === "'" || char === '`') && js[i - 1] !== '\\') {
                    if (!inString) {
                        inString = true;
                        stringChar = char;
                    } else if (char === stringChar) {
                        inString = false;
                    }
                }

                if (inString) {
                    formatted += char;
                    continue;
                }

                if (char === '{') {
                    formatted += ' {\n';
                    indentLevel++;
                } else if (char === '}') {
                    indentLevel = Math.max(0, indentLevel - 1);
                    formatted += '\n' + '  '.repeat(indentLevel) + '}';
                    if (nextChar !== ';' && nextChar !== ',' && nextChar !== ')') {
                        formatted += '\n';
                    }
                } else if (char === ';') {
                    formatted += ';\n';
                } else if (char === '\n' || char === ' ') {
                    if (formatted[formatted.length - 1] !== '\n' && formatted[formatted.length - 1] !== ' ') {
                        formatted += ' ';
                    }
                } else {
                    formatted += char;
                }
            }

            // Clean up and add indentation
            let lines = formatted.split('\n').map(line => {
                line = line.trim();
                if (!line) return '';
                const indent = '  '.repeat(Math.max(0, indentLevel - (line.startsWith('}') ? 1 : 0)));
                return indent + line;
            }).filter(line => line);

            outputJS.value = lines.join('\n');
            updateStats();
            showToast('JavaScript整形完了');
        }

        function minifyJS() {
            let js = inputJS.value.trim();
            if (!js) {
                showToast('JavaScriptコードを入力してください');
                return;
            }

            // Remove single-line comments
            js = js.replace(/\/\/.*$/gm, '');
            // Remove multi-line comments
            js = js.replace(/\/\*[\s\S]*?\*\//g, '');

            // Remove newlines and excessive whitespace
            js = js.replace(/\n/g, ' ');
            js = js.replace(/\s+/g, ' ');

            // Remove spaces around operators and delimiters (carefully)
            js = js.replace(/\s*([{}()[\];:,.])\s*/g, '$1');
            js = js.replace(/\s*([\+\-\*\/\=\<\>\!])\s*/g, ' $1 ');

            // Clean up double spaces created by operators
            js = js.replace(/\s+/g, ' ');

            outputJS.value = js.trim();
            updateStats();
            showToast('JavaScript圧縮完了');
        }

        function copyOutput() {
            if (!outputJS.value) {
                showToast('コピーする内容がありません');
                return;
            }
            navigator.clipboard.writeText(outputJS.value).then(() => {
                showToast('コピーしました');
            }).catch(() => {
                showToast('コピーに失敗しました');
            });
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }
    </script>
</body>
