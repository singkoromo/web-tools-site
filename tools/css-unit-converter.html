    <header>
        <div class="header-container">
            <a href="../index.html" class="logo">ToolBox</a>

    <div class="tool-page">
        <div class="tool-card-main">
            <div class="tool-header">
                <h1>CSSユニット変換ツール</h1>
                <p>px、rem、em、vw、vh、pt、pc など CSS単位を相互変換</p>
            </div>
            <div class="tool-content">

                <div class="form-group">
                    <span class="label">設定</span>
                    <div class="settings-grid">
                        <div class="setting-item">
                            <label for="baseFontSize">ベースフォントサイズ (px)</label>
                            <input type="number" id="baseFontSize" value="16" min="1" oninput="recalcAll()">
                        </div>
                        <div class="setting-item">
                            <label for="vpWidth">ビューポート幅 (px)</label>
                            <input type="number" id="vpWidth" value="1440" min="1" oninput="recalcAll()">
                        </div>
                        <div class="setting-item">
                            <label for="vpHeight">ビューポート高さ (px)</label>
                            <input type="number" id="vpHeight" value="900" min="1" oninput="recalcAll()">
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <div class="section-title">単位変換</div>
                    <div class="converter-row">
                        <input type="number" id="convInput" value="16" oninput="recalcMain()" step="any">
                        <select id="convFrom" onchange="recalcMain()">
                            <option value="px">px</option>
                            <option value="rem">rem</option>
                            <option value="em">em</option>
                            <option value="vw">vw</option>
                            <option value="vh">vh</option>
                            <option value="pt">pt</option>
                            <option value="pc">pc</option>
                            <option value="cm">cm</option>
                            <option value="mm">mm</option>
                        </select>
                        <span class="equals">=</span>
                        <div class="result-display" id="mainResult">1 rem</div>
                        <select id="convTo" onchange="recalcMain()">
                            <option value="px">px</option>
                            <option value="rem" selected>rem</option>
                            <option value="em">em</option>
                            <option value="vw">vw</option>
                            <option value="vh">vh</option>
                            <option value="pt">pt</option>
                            <option value="pc">pc</option>
                            <option value="cm">cm</option>
                            <option value="mm">mm</option>
                        </select>
                        <button class="btn-primary" onclick="copyText(document.getElementById('mainResult').textContent)">コピー</button>
                    </div>
                    <div class="btn-group">
                        <button class="btn-secondary" onclick="showAllUnits()">全単位で表示</button>
                    </div>
                </div>

                <div class="form-group" id="allUnitsSection" style="display:none;">
                    <div class="section-title">全単位での表示</div>
                    <table class="all-units-table" id="allUnitsTable">
                        <thead><tr><th>単位</th><th>値</th><th></th></tr></thead>
                        <tbody id="allUnitsTbody"></tbody>
                    </table>
                </div>

                <div class="form-group">
                    <div class="section-title">クイックリファレンス（px → rem / em / pt）</div>

                        <thead>
                            <tr><th>px</th><th>rem</th><th>em</th><th>pt</th></tr>

    <div class="toast" id="toast"></div>
    <script>
    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.style.display = 'block';
        setTimeout(() => { t.style.display = 'none'; }, 2000);
    }
    function copyText(text) {
        navigator.clipboard.writeText(text).then(() => showToast('コピーしました')).catch(() => {
            const ta = document.createElement('textarea');
            ta.value = text;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            showToast('コピーしました');
        });
    }

    function getSettings() {
        return {
            base: parseFloat(document.getElementById('baseFontSize').value) || 16,
            vpW:  parseFloat(document.getElementById('vpWidth').value) || 1440,
            vpH:  parseFloat(document.getElementById('vpHeight').value) || 900
        };
    }

    // Convert any unit -> px
    function toPx(value, unit, s) {
        switch(unit) {
            case 'px':  return value;
            case 'rem': return value * s.base;
            case 'em':  return value * s.base;
            case 'vw':  return (value / 100) * s.vpW;
            case 'vh':  return (value / 100) * s.vpH;
            case 'pt':  return value / 0.75;
            case 'pc':  return value * 16;
            case 'cm':  return value * 37.8;
            case 'mm':  return value * 3.78;
            default:    return value;
        }
    }

    // Convert px -> any unit
    function fromPx(px, unit, s) {
        switch(unit) {
            case 'px':  return px;
            case 'rem': return px / s.base;
            case 'em':  return px / s.base;
            case 'vw':  return (px / s.vpW) * 100;
            case 'vh':  return (px / s.vpH) * 100;
            case 'pt':  return px * 0.75;
            case 'pc':  return px / 16;
            case 'cm':  return px / 37.8;
            case 'mm':  return px / 3.78;
            default:    return px;
        }
    }

    function fmt(n) {
        if (Math.abs(n) >= 1000) return n.toFixed(2);
        if (Math.abs(n) >= 100)  return n.toFixed(3);
        return n.toFixed(4).replace(/\.?0+$/, '') || '0';
    }

    function recalcMain() {
        const val  = parseFloat(document.getElementById('convInput').value);
        const from = document.getElementById('convFrom').value;
        const to   = document.getElementById('convTo').value;
        if (isNaN(val)) { document.getElementById('mainResult').textContent = '-'; return; }
        const s = getSettings();
        const px = toPx(val, from, s);
        const result = fromPx(px, to, s);
        document.getElementById('mainResult').textContent = fmt(result) + ' ' + to;
    }

    function showAllUnits() {
        const val  = parseFloat(document.getElementById('convInput').value);
        const from = document.getElementById('convFrom').value;
        if (isNaN(val)) return;
        const s = getSettings();
        const px = toPx(val, from, s);
        const units = ['px','rem','em','vw','vh','pt','pc','cm','mm'];
        const tbody = document.getElementById('allUnitsTbody');
        tbody.innerHTML = '';
        units.forEach(u => {
            const r = fromPx(px, u, s);
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${u}</td><td>${fmt(r)} ${u}</td><td class="copy-cell" onclick="copyText('${fmt(r)} ${u}')">コピー</td>`;
            tbody.appendChild(tr);
        });
        document.getElementById('allUnitsSection').style.display = 'block';
    }

    function buildQuickRef() {
        const pxValues = [8, 12, 14, 16, 18, 24, 32, 48, 64];
        const s = getSettings();
        const tbody = document.getElementById('quickRefTbody');
        tbody.innerHTML = '';
        pxValues.forEach(px => {
            const rem = fmt(fromPx(px, 'rem', s));
            const em  = fmt(fromPx(px, 'em', s));
            const pt  = fmt(fromPx(px, 'pt', s));
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${px}px</td><td>${rem}rem</td><td>${em}em</td><td>${pt}pt</td>`;
            tbody.appendChild(tr);
        });
    }

    function recalcAll() {
        recalcMain();
        buildQuickRef();
        if (document.getElementById('allUnitsSection').style.display !== 'none') {
            showAllUnits();
        }
    }

    recalcAll();
    </script>
</body>
