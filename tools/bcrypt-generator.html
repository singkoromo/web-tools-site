    <script>
    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.style.display = 'block';
        setTimeout(() => { t.style.display = 'none'; }, 2000);
    }
    function copyText(text) {
        if (!text) return;
        navigator.clipboard.writeText(text).then(() => showToast('コピーしました')).catch(() => {
            const ta = document.createElement('textarea');
            ta.value = text;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            showToast('コピーしました');
        });
    }

    function togglePw(inputId, btn) {
        const inp = document.getElementById(inputId);
        if (inp.type === 'password') {
            inp.type = 'text';
            btn.innerHTML = '&#128064;';
        } else {
            inp.type = 'password';
            btn.innerHTML = '&#128065;';
        }
    }

    function updateCostLabel() {
        document.getElementById('costLabel').textContent = document.getElementById('costSlider').value;
    }

    let lastHash = '';

    function generateHash() {
        const password = document.getElementById('passwordInput').value;
        if (!password) { showToast('パスワードを入力してください'); return; }
        const cost = parseInt(document.getElementById('costSlider').value);
        const btn = document.getElementById('hashBtn');
        const output = document.getElementById('hashOutput');

        btn.disabled = true;
        btn.innerHTML = '<span class="loading-spin"></span>生成中...';
        output.textContent = '処理中...';
        document.getElementById('timingInfo').style.display = 'none';

        const start = Date.now();

        // bcryptjs exposes as dcodeIO.bcrypt or window.bcrypt
        const bcrypt = window.dcodeIO ? window.dcodeIO.bcrypt : window.bcrypt;
        if (!bcrypt) {
            output.textContent = 'bcryptjsライブラリの読み込みに失敗しました。ネットワーク接続を確認してください。';
            btn.disabled = false;
            btn.textContent = 'ハッシュ生成';
            return;
        }

        bcrypt.hash(password, cost, function(err, hash) {
            const elapsed = ((Date.now() - start) / 1000).toFixed(2);
            btn.disabled = false;
            btn.textContent = 'ハッシュ生成';
            if (err) {
                output.textContent = 'エラー: ' + err.message;
                return;
            }
            lastHash = hash;
            output.textContent = hash;
            document.getElementById('timingBadge').textContent = '処理時間: ' + elapsed + '秒 (コスト: ' + cost + ')';
            document.getElementById('timingInfo').style.display = 'block';
        });
    }

    function verifyHash() {
        const password = document.getElementById('verifyPassword').value;
        const hash = document.getElementById('verifyHash').value.trim();
        const resultEl = document.getElementById('verifyResult');
        const btn = document.getElementById('verifyBtn');

        if (!password || !hash) { showToast('パスワードとハッシュを両方入力してください'); return; }
        if (!hash.startsWith('$2')) { showToast('有効なBcryptハッシュではありません（$2b$ または $2a$ で始まる必要があります）'); return; }

        btn.disabled = true;
        btn.innerHTML = '<span class="loading-spin"></span>検証中...';
        resultEl.style.display = 'none';

        const bcrypt = window.dcodeIO ? window.dcodeIO.bcrypt : window.bcrypt;
        if (!bcrypt) {
            resultEl.className = 'verify-result verify-nomatch';
            resultEl.textContent = 'bcryptjsライブラリの読み込みに失敗しました。';
            resultEl.style.display = 'block';
            btn.disabled = false;
            btn.textContent = '検証';
            return;
        }

        bcrypt.compare(password, hash, function(err, result) {
            btn.disabled = false;
            btn.textContent = '検証';
            resultEl.style.display = 'block';
            if (err) {
                resultEl.className = 'verify-result verify-nomatch';
                resultEl.textContent = 'エラー: ' + err.message;
                return;
            }
            if (result) {
                resultEl.className = 'verify-result verify-match';
                resultEl.textContent = '✓ 一致 — パスワードはハッシュと一致します';
            } else {
                resultEl.className = 'verify-result verify-nomatch';
                resultEl.textContent = '✗ 不一致 — パスワードはハッシュと一致しません';
            }
        });
    }

    function pasteGeneratedHash() {
        if (!lastHash) { showToast('まずハッシュを生成してください'); return; }
        document.getElementById('verifyHash').value = lastHash;
    }

    function copyHashOutput() {
        const text = document.getElementById('hashOutput').textContent;
        if (!text || text === 'ここにハッシュが表示されます' || text === '処理中...') {
            showToast('コピーするハッシュがありません');
            return;
        }
        copyText(text);
    }
    </script>
