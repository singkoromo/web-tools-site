    <script>
        const conversions = {
            '長さ': {
                units: ['mm', 'cm', 'm', 'km', 'inch', 'foot', 'yard', 'mile'],
                toBase: {
                    'mm': 0.001,
                    'cm': 0.01,
                    'm': 1,
                    'km': 1000,
                    'inch': 0.0254,
                    'foot': 0.3048,
                    'yard': 0.9144,
                    'mile': 1609.344
                }
            },
            '重さ': {
                units: ['mg', 'g', 'kg', 'ton', 'oz', 'lb'],
                toBase: {
                    'mg': 0.000001,
                    'g': 0.001,
                    'kg': 1,
                    'ton': 1000,
                    'oz': 0.0283495,
                    'lb': 0.453592
                }
            },
            '温度': {
                units: ['°C', '°F', 'K'],
                custom: true
            },
            '面積': {
                units: ['mm²', 'cm²', 'm²', 'km²', 'acre', 'hectare'],
                toBase: {
                    'mm²': 0.000001,
                    'cm²': 0.0001,
                    'm²': 1,
                    'km²': 1000000,
                    'acre': 4046.86,
                    'hectare': 10000
                }
            },
            '体積': {
                units: ['mL', 'L', 'gallon', 'cup', 'tablespoon'],
                toBase: {
                    'mL': 0.001,
                    'L': 1,
                    'gallon': 3.78541,
                    'cup': 0.236588,
                    'tablespoon': 0.0147868
                }
            },
            '速度': {
                units: ['m/s', 'km/h', 'mph', 'knot'],
                toBase: {
                    'm/s': 1,
                    'km/h': 0.277778,
                    'mph': 0.44704,
                    'knot': 0.51444
                }
            },
            'データ容量': {
                units: ['B', 'KB', 'MB', 'GB', 'TB', 'PB'],
                toBase: {
                    'B': 1,
                    'KB': 1024,
                    'MB': 1048576,
                    'GB': 1073741824,
                    'TB': 1099511627776,
                    'PB': 1125899906842624
                }
            }
        };

        function convertTemperature(value, fromUnit, toUnit) {
            let celsius;
            if (fromUnit === '°C') celsius = value;
            else if (fromUnit === '°F') celsius = (value - 32) * 5/9;
            else if (fromUnit === 'K') celsius = value - 273.15;

            if (toUnit === '°C') return celsius;
            else if (toUnit === '°F') return celsius * 9/5 + 32;
            else if (toUnit === 'K') return celsius + 273.15;
        }

        function convert(value, fromUnit, toUnit, category) {
            if (isNaN(value) || value === '') return '';

            const config = conversions[category];

            if (config.custom) {
                return convertTemperature(parseFloat(value), fromUnit, toUnit).toFixed(6).replace(/\.?0+$/, '');
            }

            const baseValue = parseFloat(value) * config.toBase[fromUnit];
            const result = baseValue / config.toBase[toUnit];
            return result.toExponential().includes('e') && result < 0.0001
                ? result.toExponential(6)
                : result.toFixed(10).replace(/\.?0+$/, '');
        }

        function createConverter(category) {
            const config = conversions[category];
            const units = config.units;

            const section = document.createElement('div');
            section.className = 'category-section';
            section.innerHTML = `
                <h2 class="category-title">${category}</h2>
                <div class="converter-row">
                    <div class="input-group">
                        <label>${units[0]}:</label>
                        <div style="display: grid; grid-template-columns: 1fr auto; gap: 0.5rem;">
                            <input type="number" class="input1" placeholder="値を入力" step="any">
                            <select class="select1">
                                ${units.map(u => `<option value="${u}">${u}</option>`).join('')}
                            </select>
                        </div>
                    </div>
                    <div class="input-group">
                        <label>${units[1]}:</label>
                        <div style="display: grid; grid-template-columns: 1fr auto; gap: 0.5rem;">
                            <input type="number" class="input2" placeholder="値を入力" step="any">
                            <select class="select2">
                                ${units.map(u => `<option value="${u}">${u}</option>`).join('')}
                            </select>
                        </div>
                    </div>
                </div>
            `;

            const input1 = section.querySelector('.input1');
            const input2 = section.querySelector('.input2');
            const select1 = section.querySelector('.select1');
            const select2 = section.querySelector('.select2');

            function updateInput2() {
                if (input1.value === '') {
                    input2.value = '';
                    return;
                }
                const result = convert(input1.value, select1.value, select2.value, category);
                input2.value = result;
            }

            function updateInput1() {
                if (input2.value === '') {
                    input1.value = '';
                    return;
                }
                const result = convert(input2.value, select2.value, select1.value, category);
                input1.value = result;
            }

            input1.addEventListener('input', updateInput2);
            input2.addEventListener('input', updateInput1);
            select1.addEventListener('change', updateInput2);
            select2.addEventListener('change', updateInput1);

            return section;
        }

        function init() {
            const container = document.getElementById('categories');
            Object.keys(conversions).forEach(category => {
                container.appendChild(createConverter(category));
            });
        }

        init();
    </script>
