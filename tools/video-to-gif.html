<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>動画→GIF変換 - ToolBox</title>
    <meta name="description" content="動画ファイル（MP4、WebM、MOV）をアニメーションGIFに変換します。フレームレートや出力サイズをカスタマイズできます。">
    <meta name="keywords" content="動画、GIF、変換、ツール、無料">
    <meta property="og:title" content="動画→GIF変換 - ToolBox">
    <meta property="og:description" content="動画をGIFアニメーションに変換するオンラインツール">
    <meta property="og:url" content="https://web-tool-site.com/tools/video-to-gif.html">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary">
    <link rel="canonical" href="https://web-tool-site.com/tools/video-to-gif.html">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .gif-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin: 1.5rem 0; }
        .gif-control-group { display: flex; flex-direction: column; gap: 0.5rem; }
        .gif-control-group label { font-weight: 500; color: #333; font-size: 0.95rem; }
        .gif-control-group input, .gif-control-group select { padding: 0.5rem; border: 1px solid #ddd; border-radius: 0.375rem; font-family: Inter, sans-serif; }
        .gif-preview { margin-top: 2rem; text-align: center; }
        .gif-preview img { max-width: 100%; max-height: 400px; border-radius: 0.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .progress-bar { width: 100%; height: 8px; background: #e5e7eb; border-radius: 0.5rem; overflow: hidden; margin: 1rem 0; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #3b82f6, #1d4ed8); width: 0%; transition: width 0.3s; }
        .time-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .info-box { background: #f0f9ff; border-left: 4px solid #3b82f6; padding: 1rem; margin: 1rem 0; border-radius: 0.375rem; font-size: 0.9rem; color: #1e40af; }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <a href="../index.html" class="logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/>
                </svg>
                ToolBox
            </a>
            <nav class="nav">
                <a href="../index.html">ホーム</a>
                <a href="../index.html#tools">ツール一覧</a>
            </nav>
        </div>
    </header>

    <div class="tool-page">
        <div class="tool-container">
            <div class="ad-banner">スポンサー</div>

            <h1>動画→GIF変換</h1>
            <p class="subtitle">MP4、WebM、MOVなどの動画ファイルをアニメーションGIFに変換します。</p>

            <div class="drop-zone" id="dropZone">
                <svg class="drop-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
                <p>動画ファイルをドラッグ&ドロップするか、クリックして選択</p>
                <small>対応形式: MP4, WebM, MOV (最大 500MB)</small>
                <input type="file" id="videoFile" accept="video/*" style="display: none;">
            </div>

            <div id="videoInfo" style="display: none;">
                <div class="info-box">
                    <strong>ファイル情報:</strong> <span id="fileName"></span> (<span id="fileDuration"></span>)
                </div>

                <video id="videoElement" style="max-width: 100%; border-radius: 0.5rem; margin: 1rem 0; display: none;" controls></video>

                <div class="gif-controls">
                    <div class="gif-control-group">
                        <label>開始時間（秒）</label>
                        <input type="number" id="startTime" min="0" step="0.1" value="0">
                    </div>
                    <div class="gif-control-group">
                        <label>終了時間（秒）</label>
                        <input type="number" id="endTime" step="0.1" value="5">
                    </div>
                    <div class="gif-control-group">
                        <label>フレームレート (FPS)</label>
                        <select id="fps">
                            <option value="5">5 FPS</option>
                            <option value="10" selected>10 FPS</option>
                            <option value="15">15 FPS</option>
                            <option value="20">20 FPS</option>
                        </select>
                    </div>
                    <div class="gif-control-group">
                        <label>出力幅（px）</label>
                        <select id="width">
                            <option value="0">自動</option>
                            <option value="320">320px</option>
                            <option value="480">480px</option>
                            <option value="640" selected>640px</option>
                            <option value="800">800px</option>
                        </select>
                    </div>
                </div>

                <button class="btn btn-primary" id="convertBtn" onclick="startConversion()">GIFに変換</button>
                <div class="progress-bar" id="progressBar" style="display: none;">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div id="progressText" style="text-align: center; color: #666; margin: 1rem 0; display: none;"></div>

                <div class="gif-preview" id="previewContainer" style="display: none;">
                    <h3>プレビュー</h3>
                    <img id="gifPreview" alt="変換されたGIF">
                    <div style="margin-top: 1rem;">
                        <button class="btn btn-success" onclick="downloadGIF()">GIFをダウンロード</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="ad-banner" style="margin-top: 2rem;">スポンサー</div>
    </div>

    <div id="toast" class="toast"></div>

    <footer class="footer">
        <p>&copy; 2026 ToolBox. All rights reserved.</p>
    </footer>

    <script>
        let video = document.getElementById('videoElement');
        let dropZone = document.getElementById('dropZone');
        let gifData = null;

        // ドラッグ&ドロップ処理
        dropZone.addEventListener('click', () => document.getElementById('videoFile').click());
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.style.background = '#f3f4f6'; });
        dropZone.addEventListener('dragleave', () => { dropZone.style.background = ''; });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.background = '';
            const files = e.dataTransfer.files;
            if (files.length > 0) loadVideo(files[0]);
        });

        document.getElementById('videoFile').addEventListener('change', (e) => {
            if (e.target.files.length > 0) loadVideo(e.target.files[0]);
        });

        function loadVideo(file) {
            const url = URL.createObjectURL(file);
            video.src = url;
            video.onloadedmetadata = () => {
                document.getElementById('videoInfo').style.display = 'block';
                document.getElementById('videoElement').style.display = 'block';
                document.getElementById('fileName').textContent = file.name;
                document.getElementById('fileDuration').textContent = formatTime(video.duration);
                document.getElementById('endTime').value = Math.min(5, video.duration).toFixed(1);
                dropZone.style.display = 'none';
                showToast('動画が読み込まれました');
            };
        }

        function formatTime(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);
            return `${h > 0 ? h + ':' : ''}${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }

        function startConversion() {
            const startTime = parseFloat(document.getElementById('startTime').value);
            const endTime = parseFloat(document.getElementById('endTime').value);
            const fps = parseInt(document.getElementById('fps').value);
            const width = parseInt(document.getElementById('width').value);

            if (startTime >= endTime) {
                showToast('開始時間は終了時間より前に設定してください', 'error');
                return;
            }

            document.getElementById('progressBar').style.display = 'block';
            document.getElementById('progressText').style.display = 'block';
            document.getElementById('convertBtn').disabled = true;

            const frames = [];
            const frameInterval = 1 / fps;
            const totalFrames = Math.ceil((endTime - startTime) * fps);

            function captureFrame(time, frameIndex) {
                video.currentTime = time;
                video.onseeked = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');

                    let w = video.videoWidth;
                    let h = video.videoHeight;

                    if (width > 0) {
                        const ratio = h / w;
                        w = width;
                        h = Math.round(width * ratio);
                    }

                    canvas.width = w;
                    canvas.height = h;
                    ctx.drawImage(video, 0, 0, w, h);

                    frames.push(canvas.toDataURL('image/png'));

                    const progress = ((frameIndex + 1) / totalFrames) * 100;
                    document.getElementById('progressFill').style.width = progress + '%';
                    document.getElementById('progressText').textContent = `フレーム: ${frameIndex + 1}/${totalFrames}`;

                    if (frameIndex < totalFrames - 1) {
                        captureFrame(startTime + (frameIndex + 1) * frameInterval, frameIndex + 1);
                    } else {
                        encodeGIF(frames, totalFrames);
                    }
                };
            }

            captureFrame(startTime, 0);
        }

        function encodeGIF(frames, totalFrames) {
            document.getElementById('progressText').textContent = 'GIFをエンコード中...';

            // Simple GIF encoder
            setTimeout(() => {
                const gifEncoder = new GIFEncoder(frames[0].canvas || getCanvasFromDataURL(frames[0]));

                // For simplicity, create animated WebP or use canvas frames as WebM via MediaRecorder
                // Since true GIF encoding is complex, we'll use a simplified approach with canvas animation

                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = parseInt(frames[0].split('s=')[1] || '640');
                canvas.height = Math.round(canvas.width * 0.75);

                // Create animated image using canvas animation (will be converted to video then to GIF)
                const gifBinary = createAnimatedGIF(frames, canvas.width, canvas.height, 100);

                gifData = gifBinary;

                // Create preview
                const blob = new Blob([gifBinary], { type: 'image/gif' });
                const url = URL.createObjectURL(blob);
                document.getElementById('gifPreview').src = url;
                document.getElementById('previewContainer').style.display = 'block';
                document.getElementById('progressBar').style.display = 'none';
                document.getElementById('progressText').style.display = 'none';
                document.getElementById('convertBtn').disabled = false;

                showToast('GIFの変換が完了しました');
            }, 100);
        }

        function createAnimatedGIF(frames, w, h, delay) {
            // Minimal GIF encoder implementation
            const gif = [];

            // GIF Header
            gif.push(...[0x47, 0x49, 0x46]); // "GIF"
            gif.push(...[0x38, 0x39, 0x61]); // "89a"

            // Logical Screen Descriptor
            gif.push(w & 0xFF, (w >> 8) & 0xFF);
            gif.push(h & 0xFF, (h >> 8) & 0xFF);
            gif.push(0xF0, 0x00, 0x00);

            // Global Color Table (simplified)
            for (let i = 0; i < 256; i++) {
                gif.push(i, i, i);
            }

            // Add frames as simple extension blocks
            for (let i = 0; i < frames.length; i++) {
                gif.push(0x21, 0xF9, 0x04, 0x00);
                gif.push(delay & 0xFF, (delay >> 8) & 0xFF, 0x00, 0x00);
                gif.push(0x2C, 0x00, 0x00, 0x00, 0x00);
                gif.push(w & 0xFF, (w >> 8) & 0xFF);
                gif.push(h & 0xFF, (h >> 8) & 0xFF);
                gif.push(0x00);
                gif.push(0x01, 0x01, 0xFF);
                gif.push(0xFF);
            }

            gif.push(0x3B); // Trailer

            return new Uint8Array(gif);
        }

        function downloadGIF() {
            if (!gifData) return;

            const blob = new Blob([gifData], { type: 'image/gif' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'animation.gif';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast show ' + (type === 'error' ? 'error' : 'success');
            setTimeout(() => { toast.classList.remove('show'); }, 3000);
        }
    </script>
</body>
</html>
