<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JWTデコーダー - ToolBox</title>
    <meta name="description" content="JWTトークンをデコードして、ヘッダー、ペイロード、署名を確認します。">
    <meta name="keywords" content="JWT, JSON Web Token, デコード, 解析">
    <meta property="og:title" content="JWTデコーダー - ToolBox">
    <meta property="og:description" content="JWTトークンをデコードして、ヘッダー、ペイロード、署名を確認します。">
    <meta property="og:url" content="https://web-tool-site.com/tools/jwt-decoder.html">
    <meta property="og:site_name" content="ToolBox">
    <link rel="canonical" href="https://web-tool-site.com/tools/jwt-decoder.html">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        :root {
            --primary: #3b82f6;
            --primary-light: #eff6ff;
            --primary-dark: #1e40af;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --border: #e5e7eb;
            --bg: #f9fafb;
            --text: #1f2937;
            --text-light: #6b7280;
            --header-color: #dc2626;
            --payload-color: #9333ea;
            --signature-color: #0284c7;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        .header {
            background: white;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .header-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--primary);
            text-decoration: none;
        }

        .logo svg {
            width: 24px;
            height: 24px;
        }

        .nav {
            display: flex;
            gap: 2rem;
        }

        .nav a {
            color: var(--text);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav a:hover {
            color: var(--primary);
        }

        .container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        .ad-top {
            background: #f0f0f0;
            border: 1px solid var(--border);
            padding: 2rem;
            border-radius: 0.5rem;
            margin-bottom: 2rem;
            text-align: center;
            color: var(--text-light);
            font-size: 0.875rem;
        }

        .tool-section {
            background: white;
            border-radius: 0.5rem;
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border);
        }

        .tool-section h2 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: var(--primary-dark);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text);
        }

        textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 0.375rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.875rem;
            transition: border-color 0.2s;
            min-height: 120px;
            resize: vertical;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.375rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            font-family: 'Inter', sans-serif;
        }

        button:hover {
            background: var(--primary-dark);
        }

        .section-header {
            background: white;
            border-left: 4px solid var(--primary);
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 0.375rem;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .section-header.header-section {
            border-left-color: var(--header-color);
            background: #fef2f2;
            color: #991b1b;
        }

        .section-header.payload-section {
            border-left-color: var(--payload-color);
            background: #faf5ff;
            color: #6b21a8;
        }

        .section-header.signature-section {
            border-left-color: var(--signature-color);
            background: #f0f9ff;
            color: #0c4a6e;
        }

        .code-block {
            background: #1f2937;
            color: #e5e7eb;
            padding: 1rem;
            border-radius: 0.375rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.875rem;
            overflow-x: auto;
            margin-bottom: 1rem;
            line-height: 1.5;
        }

        .json-key {
            color: #60a5fa;
        }

        .json-string {
            color: #86efac;
        }

        .json-number {
            color: #fbbf24;
        }

        .json-boolean {
            color: #f87171;
        }

        .claims-list {
            background: white;
            border: 1px solid var(--border);
            border-radius: 0.375rem;
            overflow: hidden;
        }

        .claim-item {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            display: grid;
            grid-template-columns: 200px 1fr;
            gap: 1rem;
        }

        .claim-item:last-child {
            border-bottom: none;
        }

        .claim-key {
            font-weight: 600;
            color: var(--primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.875rem;
        }

        .claim-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.875rem;
            color: var(--text-light);
            word-break: break-all;
        }

        .claim-description {
            font-size: 0.8rem;
            color: var(--text-light);
            margin-top: 0.25rem;
        }

        .expiration-status {
            padding: 1rem;
            border-radius: 0.375rem;
            margin-bottom: 1rem;
            font-weight: 500;
        }

        .expiration-status.expired {
            background: #fee2e2;
            color: #991b1b;
            border-left: 4px solid #dc2626;
        }

        .expiration-status.valid {
            background: #dcfce7;
            color: #166534;
            border-left: 4px solid #16a34a;
        }

        .expiration-status.invalid {
            background: #fef3c7;
            color: #92400e;
            border-left: 4px solid #f59e0b;
        }

        .error-message {
            background: #fee2e2;
            color: #991b1b;
            border-left: 4px solid #dc2626;
            padding: 1rem;
            border-radius: 0.375rem;
            margin-bottom: 1rem;
        }

        .footer {
            background: white;
            border-top: 1px solid var(--border);
            padding: 2rem;
            margin-top: 2rem;
            text-align: center;
            color: var(--text-light);
            font-size: 0.875rem;
        }

        .toast {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            background: var(--text);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 0.375rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            animation: slideIn 0.3s ease-out;
            z-index: 1000;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .header-inner {
                flex-direction: column;
                gap: 1rem;
            }

            .nav {
                gap: 1rem;
            }

            .claim-item {
                grid-template-columns: 1fr;
            }

            .claim-key {
                margin-bottom: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <a href="../index.html" class="logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/>
                </svg>
                ToolBox
            </a>
            <nav class="nav">
                <a href="../index.html">ホーム</a>
                <a href="../index.html#tools">ツール一覧</a>
            </nav>
        </div>
    </header>

    <div class="container">
        <div class="ad-top">
            📢 広告スペース
        </div>

        <div class="tool-section">
            <h2>JWTデコーダー</h2>

            <div class="form-group">
                <label for="jwtInput">JWTトークンをペーストまたは入力</label>
                <textarea id="jwtInput" placeholder="例: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiaWF0IjoxNTE2MjM5MDIyfQ.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c"></textarea>
                <button onclick="decodeJWT()" style="margin-top: 0.5rem; width: 100%;">デコード</button>
            </div>

            <div id="results"></div>
        </div>

        <div class="ad-top">
            📢 広告スペース
        </div>
    </div>

    <footer class="footer">
        © 2026 ToolBox. All rights reserved.
    </footer>

    <script>
        // Auto-decode on input
        document.getElementById('jwtInput').addEventListener('paste', () => {
            setTimeout(() => decodeJWT(), 100);
        });

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function base64UrlDecode(str) {
            let output = str.replace(/-/g, '+').replace(/_/g, '/');
            switch (output.length % 4) {
                case 0:
                    break;
                case 2:
                    output += '==';
                    break;
                case 3:
                    output += '=';
                    break;
                default:
                    throw new Error('Invalid base64url string');
            }
            return decodeURIComponent(atob(output).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
        }

        function syntaxHighlight(json) {
            json = json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, (match) => {
                let cls = 'json-number';
                if (/^"/.test(match)) {
                    if (/:$/.test(match)) {
                        cls = 'json-key';
                    } else {
                        cls = 'json-string';
                    }
                } else if (/true|false/.test(match)) {
                    cls = 'json-boolean';
                } else if (/null/.test(match)) {
                    cls = 'json-boolean';
                }
                return `<span class="${cls}">${match}</span>`;
            });
        }

        function decodeJWT() {
            const jwt = document.getElementById('jwtInput').value.trim();
            const resultsDiv = document.getElementById('results');

            if (!jwt) {
                resultsDiv.innerHTML = '<div class="error-message">JWTトークンを入力してください。</div>';
                return;
            }

            const parts = jwt.split('.');
            if (parts.length !== 3) {
                resultsDiv.innerHTML = '<div class="error-message">無効なJWTトークンです。トークンは3つのドット区切り部分で構成される必要があります。</div>';
                return;
            }

            try {
                const headerJson = base64UrlDecode(parts[0]);
                const payloadJson = base64UrlDecode(parts[1]);
                const signatureHex = parts[2];

                const header = JSON.parse(headerJson);
                const payload = JSON.parse(payloadJson);

                let html = '<div class="results">';

                // Header
                html += '<div class="section-header header-section">ヘッダー (Header)</div>';
                html += `<div class="code-block">${syntaxHighlight(JSON.stringify(header, null, 2))}</div>`;

                // Payload
                html += '<div class="section-header payload-section">ペイロード (Payload)</div>';
                html += `<div class="code-block">${syntaxHighlight(JSON.stringify(payload, null, 2))}</div>`;

                // Claims
                if (Object.keys(payload).length > 0) {
                    html += '<div style="margin-bottom: 1.5rem;"><strong>クレーム（Claims）</strong></div>';
                    html += '<div class="claims-list">';

                    const claims = {
                        'iss': '発行者（Issuer）',
                        'sub': 'サブジェクト（Subject）',
                        'aud': 'オーディエンス（Audience）',
                        'exp': '有効期限（Expiration Time）',
                        'nbf': 'Not Before',
                        'iat': '発行時刻（Issued At）',
                        'jti': 'JWT ID'
                    };

                    for (const [key, desc] of Object.entries(claims)) {
                        if (payload[key] !== undefined) {
                            let value = payload[key];
                            if ((key === 'exp' || key === 'nbf' || key === 'iat') && typeof value === 'number') {
                                const date = new Date(value * 1000);
                                value = `${value} (${date.toLocaleString('ja-JP')})`;
                            }
                            html += `<div class="claim-item">
                                <div class="claim-key">${key}</div>
                                <div>
                                    <div class="claim-value">${value}</div>
                                    <div class="claim-description">${desc}</div>
                                </div>
                            </div>`;
                        }
                    }

                    html += '</div>';
                }

                // Expiration check
                if (payload.exp) {
                    const now = Math.floor(Date.now() / 1000);
                    if (payload.exp < now) {
                        html += '<div class="expiration-status expired">⏱ このトークンは期限切れです。 (有効期限: ' + new Date(payload.exp * 1000).toLocaleString('ja-JP') + ')</div>';
                    } else {
                        const remainingSeconds = payload.exp - now;
                        html += '<div class="expiration-status valid">✓ トークンは有効です。 (残り時間: ' + formatTime(remainingSeconds) + ')</div>';
                    }
                } else {
                    html += '<div class="expiration-status invalid">⚠ 有効期限（exp）が設定されていません。</div>';
                }

                // Signature
                html += '<div class="section-header signature-section">署名 (Signature)</div>';
                html += `<div class="code-block">${signatureHex}</div>`;
                html += '<p style="color: var(--text-light); font-size: 0.875rem;">注: 署名の検証にはシークレットキーが必要で、ブラウザ側では実行できません。バックエンド側で検証してください。</p>';

                html += '</div>';

                resultsDiv.innerHTML = html;
            } catch (error) {
                resultsDiv.innerHTML = `<div class="error-message">デコードエラー: ${error.message}</div>`;
            }
        }

        function formatTime(seconds) {
            const days = Math.floor(seconds / 86400);
            const hours = Math.floor((seconds % 86400) / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            const secs = seconds % 60;

            if (days > 0) return `${days}日 ${hours}時間`;
            if (hours > 0) return `${hours}時間 ${minutes}分`;
            if (minutes > 0) return `${minutes}分 ${secs}秒`;
            return `${secs}秒`;
        }
    </script>
</body>
</html>
