<div class="toast" id="toast"></div>

<script>
class AudioVolume {
    constructor() {
        this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
        this.audioBuffer = null;
        this.source = null;
        this.gainNode = null;
        this.isPlaying = false;
        this.playbackStartTime = 0;
        this.playbackPausedTime = 0;
        this.volume = 1;
        this.fadeInDuration = 0;
        this.fadeOutDuration = 0;

        this.initElements();
        this.attachEventListeners();
    }

    initElements() {
        this.dropZone = document.getElementById('dropZone');
        this.audioInput = document.getElementById('audioInput');
        this.fileInfo = document.getElementById('fileInfo');
        this.controlsPanel = document.getElementById('controlsPanel');
        this.playbackSection = document.getElementById('playbackSection');
        this.volumeSlider = document.getElementById('volumeSlider');
        this.volumeValue = document.getElementById('volumeValue');
        this.fadeInSelect = document.getElementById('fadeInSelect');
        this.fadeInValue = document.getElementById('fadeInValue');
        this.fadeOutSelect = document.getElementById('fadeOutSelect');
        this.fadeOutValue = document.getElementById('fadeOutValue');
        this.peakLevel = document.getElementById('peakLevel');
        this.rmsLevel = document.getElementById('rmsLevel');
        this.normalizeBtn = document.getElementById('normalizeBtn');
        this.playBtn = document.getElementById('playBtn');
        this.pauseBtn = document.getElementById('pauseBtn');
        this.stopBtn = document.getElementById('stopBtn');
        this.progressFill = document.getElementById('progressFill');
        this.exportBtn = document.getElementById('exportBtn');
        this.currentTimeDisplay = document.getElementById('currentTime');
        this.totalTimeDisplay = document.getElementById('totalTime');
    }

    attachEventListeners() {
        this.dropZone.addEventListener('click', () => this.audioInput.click());
        this.dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            this.dropZone.classList.add('dragover');
        });
        this.dropZone.addEventListener('dragleave', () => {
            this.dropZone.classList.remove('dragover');
        });
        this.dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            this.dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                this.handleFile(e.dataTransfer.files[0]);
            }
        });

        this.audioInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) this.handleFile(e.target.files[0]);
        });

        this.volumeSlider.addEventListener('input', (e) => {
            this.volume = parseFloat(e.target.value) / 100;
            this.volumeValue.textContent = e.target.value + '%';
        });

        this.fadeInSelect.addEventListener('change', (e) => {
            this.fadeInDuration = parseFloat(e.target.value);
            this.fadeInValue.textContent = this.fadeInDuration === 0 ? 'なし' : this.fadeInDuration + '秒';
        });

        this.fadeOutSelect.addEventListener('change', (e) => {
            this.fadeOutDuration = parseFloat(e.target.value);
            this.fadeOutValue.textContent = this.fadeOutDuration === 0 ? 'なし' : this.fadeOutDuration + '秒';
        });

        this.normalizeBtn.addEventListener('click', () => this.normalize());
        this.playBtn.addEventListener('click', () => this.play());
        this.pauseBtn.addEventListener('click', () => this.pause());
        this.stopBtn.addEventListener('click', () => this.stop());
        this.exportBtn.addEventListener('click', () => this.export());
    }

    async handleFile(file) {
        const arrayBuffer = await file.arrayBuffer();
        try {
            this.audioBuffer = await this.audioContext.decodeAudioData(arrayBuffer);
            this.displayFileInfo(file);
            this.analyzeAudio();
            this.fileInfo.classList.add('show');
            this.controlsPanel.classList.add('show');
            this.playbackSection.classList.add('show');
            this.totalTimeDisplay.textContent = this.formatTime(this.audioBuffer.duration);
        } catch (error) {
            this.showToast('ファイルのデコードに失敗しました');
        }
    }

    displayFileInfo(file) {
        document.getElementById('infoFilename').textContent = file.name;
        document.getElementById('infoDuration').textContent = this.formatTime(this.audioBuffer.duration);
    }

    analyzeAudio() {
        const data = this.audioBuffer.getChannelData(0);
        let peak = 0;
        let rms = 0;

        for (let i = 0; i < data.length; i++) {
            const sample = Math.abs(data[i]);
            if (sample > peak) peak = sample;
            rms += sample * sample;
        }

        rms = Math.sqrt(rms / data.length);

        const peakDB = peak > 0 ? (20 * Math.log10(peak)).toFixed(2) : '-∞';
        const rmsDB = rms > 0 ? (20 * Math.log10(rms)).toFixed(2) : '-∞';

        this.peakLevel.textContent = peakDB + ' dB';
        this.rmsLevel.textContent = rmsDB + ' dB';
    }

    normalize() {
        if (!this.audioBuffer) return;

        const data = this.audioBuffer.getChannelData(0);
        let peak = 0;

        for (let i = 0; i < data.length; i++) {
            const sample = Math.abs(data[i]);
            if (sample > peak) peak = sample;
        }

        if (peak === 0) {
            this.showToast('無音ファイルです');
            return;
        }

        const scaleFactor = 0.99 / peak;
        this.volume = scaleFactor;
        this.volumeSlider.value = Math.min(300, Math.round(scaleFactor * 100));
        this.volumeValue.textContent = this.volumeSlider.value + '%';
        this.showToast('正規化しました');
    }

    play() {
        if (this.isPlaying) return;

        this.isPlaying = true;
        this.playBtn.style.display = 'none';
        this.pauseBtn.style.display = 'inline-block';

        this.source = this.audioContext.createBufferSource();
        this.source.buffer = this.audioBuffer;
        this.gainNode = this.audioContext.createGain();

        this.source.connect(this.gainNode);
        this.gainNode.connect(this.audioContext.destination);

        this.playbackStartTime = this.audioContext.currentTime - this.playbackPausedTime;
        const offset = this.playbackPausedTime;

        // Apply fade in
        if (this.fadeInDuration > 0 && offset === 0) {
            this.gainNode.gain.setValueAtTime(0, this.audioContext.currentTime);
            this.gainNode.gain.linearRampToValueAtTime(this.volume, this.audioContext.currentTime + this.fadeInDuration);
        } else {
            this.gainNode.gain.setValueAtTime(this.volume, this.audioContext.currentTime);
        }

        // Apply fade out
        if (this.fadeOutDuration > 0) {
            const startFadeTime = this.audioContext.currentTime + (this.audioBuffer.duration - offset - this.fadeOutDuration);
            this.gainNode.gain.setValueAtTime(this.volume, startFadeTime);
            this.gainNode.gain.linearRampToValueAtTime(0, startFadeTime + this.fadeOutDuration);
        }

        this.source.start(0, offset);
        this.animateProgress();
    }

    pause() {
        if (!this.isPlaying) return;

        this.playbackPausedTime = this.audioContext.currentTime - this.playbackStartTime;
        this.source.stop();
        this.isPlaying = false;
        this.playBtn.style.display = 'inline-block';
        this.pauseBtn.style.display = 'none';
    }

    stop() {
        if (this.source && this.isPlaying) {
            this.source.stop();
        }
        this.isPlaying = false;
        this.playbackPausedTime = 0;
        this.currentTimeDisplay.textContent = '0:00';
        this.progressFill.style.width = '0%';
        this.playBtn.style.display = 'inline-block';
        this.pauseBtn.style.display = 'none';
    }

    animateProgress() {
        const totalDuration = this.audioBuffer.duration;
        const updateProgress = () => {
            if (!this.isPlaying) return;

            const elapsed = this.audioContext.currentTime - this.playbackStartTime;
            const percent = (elapsed / totalDuration) * 100;
            this.progressFill.style.width = Math.min(percent, 100) + '%';
            this.currentTimeDisplay.textContent = this.formatTime(elapsed);

            if (elapsed < totalDuration) {
                requestAnimationFrame(updateProgress);
            } else {
                this.stop();
            }
        };
        updateProgress();
    }

    async export() {
        this.stop();
        this.showToast('処理中...');

        try {
            const offlineContext = new OfflineAudioContext(
                this.audioBuffer.numberOfChannels,
                this.audioBuffer.length,
                this.audioBuffer.sampleRate
            );

            const source = offlineContext.createBufferSource();
            source.buffer = this.audioBuffer;
            const gainNode = offlineContext.createGain();

            source.connect(gainNode);
            gainNode.connect(offlineContext.destination);

            // Apply fade in
            if (this.fadeInDuration > 0) {
                gainNode.gain.setValueAtTime(0, 0);
                gainNode.gain.linearRampToValueAtTime(this.volume, this.fadeInDuration);
            } else {
                gainNode.gain.setValueAtTime(this.volume, 0);
            }

            // Apply fade out
            if (this.fadeOutDuration > 0) {
                const startFadeTime = this.audioBuffer.duration - this.fadeOutDuration;
                gainNode.gain.setValueAtTime(this.volume, startFadeTime);
                gainNode.gain.linearRampToValueAtTime(0, this.audioBuffer.duration);
            }

            source.start(0);
            const renderedBuffer = await offlineContext.startRendering();
            const blob = this.encodeWAV(renderedBuffer);
            this.downloadBlob(blob, 'volume_adjusted.wav');
            this.showToast('ファイルをダウンロードしました');
        } catch (error) {
            this.showToast('エクスポートに失敗しました');
        }
    }

    encodeWAV(audioBuffer) {
        const numberOfChannels = audioBuffer.numberOfChannels;
        const sampleRate = audioBuffer.sampleRate;
        const format = 1;
        const bitDepth = 16;
        const bytesPerSample = bitDepth / 8;
        const blockAlign = numberOfChannels * bytesPerSample;

        const channelData = [];
        for (let i = 0; i < numberOfChannels; i++) {
            channelData.push(audioBuffer.getChannelData(i));
        }

        const length = audioBuffer.length * numberOfChannels * bytesPerSample;
        const buffer = new ArrayBuffer(44 + length);
        const view = new DataView(buffer);

        const writeString = (offset, string) => {
            for (let i = 0; i < string.length; i++) {
                view.setUint8(offset + i, string.charCodeAt(i));
            }
        };

        writeString(0, 'RIFF');
        view.setUint32(4, 36 + length, true);
        writeString(8, 'WAVE');
        writeString(12, 'fmt ');
        view.setUint32(16, 16, true);
        view.setUint16(20, format, true);
        view.setUint16(22, numberOfChannels, true);
        view.setUint32(24, sampleRate, true);
        view.setUint32(28, sampleRate * blockAlign, true);
        view.setUint16(32, blockAlign, true);
        view.setUint16(34, bitDepth, true);
        writeString(36, 'data');
        view.setUint32(40, length, true);

        let offset = 44;
        for (let i = 0; i < audioBuffer.length; i++) {
            for (let channel = 0; channel < numberOfChannels; channel++) {
                let sample = Math.max(-1, Math.min(1, channelData[channel][i]));
                sample = sample < 0 ? sample * 0x8000 : sample * 0x7FFF;
                view.setInt16(offset, sample, true);
                offset += 2;
            }
        }

        return new Blob([buffer], { type: 'audio/wav' });
    }

    downloadBlob(blob, filename) {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    formatTime(seconds) {
        const minutes = Math.floor(seconds / 60);
        const secs = (seconds % 60).toFixed(0);
        return `${minutes}:${String(secs).padStart(2, '0')}`;
    }

    showToast(message) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }
}

document.addEventListener('DOMContentLoaded', () => {
    new AudioVolume();
});
</script>
