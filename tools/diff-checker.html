    <div class="toast" id="toast"></div>

    <script>
        function showToast(message, duration = 2000) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, duration);
        }

        function swapTexts() {
            const original = document.getElementById('originalText');
            const changed = document.getElementById('changedText');
            [original.value, changed.value] = [changed.value, original.value];
            performDiff();
        }

        function computeDiff(original, changed) {
            const originalLines = original.split('\n');
            const changedLines = changed.split('\n');

            const dp = Array(originalLines.length + 1).fill(null).map(() =>
                Array(changedLines.length + 1).fill(0)
            );

            for (let i = 0; i <= originalLines.length; i++) {
                dp[i][0] = i;
            }
            for (let j = 0; j <= changedLines.length; j++) {
                dp[0][j] = j;
            }

            for (let i = 1; i <= originalLines.length; i++) {
                for (let j = 1; j <= changedLines.length; j++) {
                    if (originalLines[i - 1] === changedLines[j - 1]) {
                        dp[i][j] = dp[i - 1][j - 1];
                    } else {
                        dp[i][j] = 1 + Math.min(
                            dp[i - 1][j],
                            dp[i][j - 1],
                            dp[i - 1][j - 1]
                        );
                    }
                }
            }

            const result = [];
            let i = originalLines.length;
            let j = changedLines.length;

            while (i > 0 || j > 0) {
                if (i > 0 && j > 0 && originalLines[i - 1] === changedLines[j - 1]) {
                    result.unshift({ type: 'unchanged', content: originalLines[i - 1] });
                    i--;
                    j--;
                } else if (j > 0 && (i === 0 || dp[i][j - 1] < dp[i - 1][j])) {
                    result.unshift({ type: 'added', content: changedLines[j - 1] });
                    j--;
                } else if (i > 0) {
                    result.unshift({ type: 'removed', content: originalLines[i - 1] });
                    i--;
                }
            }

            return result;
        }

        function performDiff() {
            const original = document.getElementById('originalText').value;
            const changed = document.getElementById('changedText').value;
            const resultsDiv = document.getElementById('results');

            if (!original && !changed) {
                resultsDiv.innerHTML = '<div class="empty-state">テキストを入力して比較を開始してください</div>';
                return;
            }

            const diff = computeDiff(original, changed);

            let addedCount = 0;
            let removedCount = 0;
            let unchangedCount = 0;

            diff.forEach(line => {
                if (line.type === 'added') addedCount++;
                else if (line.type === 'removed') removedCount++;
                else unchangedCount++;
            });

            let html = `
                <div class="statistics">
                    <div class="stat-item">
                        <div class="stat-label">追加行</div>
                        <div class="stat-value added">${addedCount}</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">削除行</div>
                        <div class="stat-value removed">${removedCount}</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">変更なし</div>
                        <div class="stat-value unchanged">${unchangedCount}</div>
                    </div>
                </div>

                <div class="view-toggle">
                    <button class="active" onclick="showView('sidebyside')">並べて表示</button>
                    <button onclick="showView('unified')">統合表示</button>
                </div>

                <div class="diff-result">
            `;

            html += renderSideBySide(diff);
            html += '</div>';

            resultsDiv.innerHTML = html;
        }

        function renderSideBySide(diff) {
            const originalLines = [];
            const changedLines = [];
            let origNum = 1;
            let chanNum = 1;

            diff.forEach(line => {
                if (line.type === 'removed') {
                    originalLines.push({ num: origNum++, content: line.content, type: 'removed' });
                } else if (line.type === 'added') {
                    changedLines.push({ num: chanNum++, content: line.content, type: 'added' });
                } else {
                    originalLines.push({ num: origNum++, content: line.content, type: 'unchanged' });
                    changedLines.push({ num: chanNum++, content: line.content, type: 'unchanged' });
                }
            });

            const maxLines = Math.max(originalLines.length, changedLines.length);
            let html = '<div class="diff-side-by-side">';

            html += '<div class="diff-column">';
            html += '<div class="diff-column-header">元のテキスト</div>';
            for (let i = 0; i < maxLines; i++) {
                const line = originalLines[i];
                if (line) {
                    html += `
                        <div class="diff-line">
                            <div class="line-number">${line.num}</div>
                            <div class="line-content line-${line.type}">${escapeHtml(line.content)}</div>
                        </div>
                    `;
                } else {
                    html += '<div class="diff-line"><div class="line-number"></div><div class="line-content"></div></div>';
                }
            }
            html += '</div>';

            html += '<div class="diff-column">';
            html += '<div class="diff-column-header">変更後のテキスト</div>';
            for (let i = 0; i < maxLines; i++) {
                const line = changedLines[i];
                if (line) {
                    html += `
                        <div class="diff-line">
                            <div class="line-number">${line.num}</div>
                            <div class="line-content line-${line.type}">${escapeHtml(line.content)}</div>
                        </div>
                    `;
                } else {
                    html += '<div class="diff-line"><div class="line-number"></div><div class="line-content"></div></div>';
                }
            }
            html += '</div>';
            html += '</div>';

            return html;
        }

        function renderUnified(diff) {
            let html = '<div class="diff-unified">';
            let origNum = 1;
            let chanNum = 1;

            diff.forEach(line => {
                let prefix = ' ';
                let className = 'line-unchanged';

                if (line.type === 'removed') {
                    prefix = '-';
                    className = 'line-removed';
                } else if (line.type === 'added') {
                    prefix = '+';
                    className = 'line-added';
                }

                html += `
                    <div class="diff-line">
                        <div class="line-number">${line.type === 'removed' ? origNum++ : '-'}</div>
                        <div class="line-number">${line.type === 'added' ? chanNum++ : '-'}</div>
                        <div class="unified-prefix ${className}">${prefix}</div>
                        <div class="line-content ${className}">${escapeHtml(line.content)}</div>
                    </div>
                `;
            });

            html += '</div>';
            return html;
        }

        function showView(view) {
            const original = document.getElementById('originalText').value;
            const changed = document.getElementById('changedText').value;
            const diff = computeDiff(original, changed);

            const buttons = document.querySelectorAll('.view-toggle button');
            buttons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            const resultsDiv = document.getElementById('results');
            let html = resultDiv.innerHTML.split('<div class="view-toggle">')[0];
            html += '<div class="view-toggle">';
            html += '<button class="' + (view === 'sidebyside' ? 'active' : '') + '" onclick="showView(\'sidebyside\')">並べて表示</button>';
            html += '<button class="' + (view === 'unified' ? 'active' : '') + '" onclick="showView(\'unified\')">統合表示</button>';
            html += '</div>';

            if (view === 'sidebyside') {
                html += '<div class="diff-result">' + renderSideBySide(diff) + '</div>';
            } else {
                html += '<div class="diff-result">' + renderUnified(diff) + '</div>';
            }

            resultsDiv.innerHTML = html;
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;'
            };
            return text.replace(/[&<>"']/g, char => map[char]);
        }

        performDiff();
    </script>
