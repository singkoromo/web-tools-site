<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ダミーテキスト生成 - ToolBox</title>
    <meta name="description" content="日本語と英語のダミーテキスト（Lorem Ipsum）を自由に生成できるツールです。">
    <meta property="og:title" content="ダミーテキスト生成 - ToolBox">
    <meta property="og:description" content="日本語と英語のダミーテキスト（Lorem Ipsum）を自由に生成できるツールです。">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://web-tool-site.com/tools/lorem-generator.html">
    <link rel="canonical" href="https://web-tool-site.com/tools/lorem-generator.html">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .tool-section {
            margin: 20px 0;
        }
        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 8px;
        }
        .option-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .option-group label {
            font-weight: 500;
            font-size: 14px;
            color: #333;
        }
        .option-group input,
        .option-group select {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        .radio-group {
            display: flex;
            gap: 15px;
        }
        .radio-group label {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            margin: 0;
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .btn {
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.2s;
        }
        .btn:hover {
            background: #0056b3;
        }
        .btn-copy {
            background: #28a745;
        }
        .btn-copy:hover {
            background: #1e7e34;
        }
        .output {
            background: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 15px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
            max-height: 400px;
            overflow-y: auto;
            min-height: 100px;
        }
    </style>
</head>
<body>
    <div class="tool-page">
        <header class="header">
            <div class="header-inner">
                <a href="../index.html" class="logo">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/>
                    </svg>
                    ToolBox
                </a>
                <nav class="nav">
                    <a href="../index.html">ホーム</a>
                    <a href="../index.html#tools">ツール一覧</a>
                </nav>
            </div>
        </header>

        <div class="ad-banner">
            <div class="ad-placeholder">広告スペース（Google AdSense）</div>
        </div>

        <div class="tool-container">
            <h1>ダミーテキスト生成</h1>
            <p>日本語と英語のダミーテキスト（Lorem Ipsum）を自由に生成できます。</p>

            <div class="tool-section">
                <div class="options">
                    <div class="option-group">
                        <label>言語</label>
                        <div class="radio-group">
                            <label><input type="radio" name="language" value="en" checked> English</label>
                            <label><input type="radio" name="language" value="ja"> 日本語</label>
                        </div>
                    </div>
                    <div class="option-group">
                        <label>生成タイプ</label>
                        <select id="type">
                            <option value="paragraph">段落</option>
                            <option value="sentence">文</option>
                            <option value="word">単語</option>
                        </select>
                    </div>
                    <div class="option-group">
                        <label>数量（1-20）</label>
                        <input type="number" id="count" min="1" max="20" value="5">
                    </div>
                </div>

                <div class="button-group">
                    <button class="btn" onclick="generateLorem()">生成</button>
                </div>

                <div class="output" id="output"></div>

                <div class="button-group" style="margin-top: 10px;">
                    <button class="btn btn-copy" onclick="copyOutput()">出力をコピー</button>
                </div>
            </div>
        </div>

        <div class="ad-banner">
            <div class="ad-placeholder">広告スペース（Google AdSense）</div>
        </div>

        <footer class="footer">
            <div class="footer-links">
                <a href="../index.html">ホーム</a>
                <a href="../index.html#tools">ツール一覧</a>
                <a href="../privacy.html">プライバシーポリシー</a>
            </div>
            <p>&copy; 2026 ToolBox. All rights reserved.</p>
        </footer>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        const japaneseWords = [
            'あ', 'い', 'う', 'え', 'お', 'か', 'き', 'く', 'け', 'こ',
            'さ', 'し', 'す', 'せ', 'そ', 'た', 'ち', 'つ', 'て', 'と',
            'な', 'に', 'ぬ', 'ね', 'の', 'は', 'ひ', 'ふ', 'へ', 'ほ',
            'ま', 'み', 'む', 'め', 'も', 'や', 'ゆ', 'よ', 'ら', 'り',
            'る', 'れ', 'ろ', 'わ', 'ゐ', 'ゑ', 'を', 'ん',
            'システム', 'ツール', 'データ', '情報', '処理', '機能', '画面', 'ユーザー',
            '管理', '設定', '実行', 'テキスト', '検索', 'ファイル', 'フォルダ'
        ];

        const englishWords = [
            'lorem', 'ipsum', 'dolor', 'sit', 'amet', 'consectetur', 'adipiscing',
            'elit', 'sed', 'do', 'eiusmod', 'tempor', 'incididunt', 'ut', 'labore',
            'et', 'dolore', 'magna', 'aliqua', 'enim', 'ad', 'minim', 'veniam',
            'quis', 'nostrud', 'exercitation', 'ullamco', 'laboris', 'nisi',
            'aliquip', 'ex', 'ea', 'commodo', 'consequat', 'duis', 'aute', 'irure'
        ];

        function getRandomWord(language) {
            const words = language === 'ja' ? japaneseWords : englishWords;
            return words[Math.floor(Math.random() * words.length)];
        }

        function generateSentence(language) {
            const wordCount = Math.floor(Math.random() * 10) + 5;
            let sentence = '';
            for (let i = 0; i < wordCount; i++) {
                sentence += getRandomWord(language);
                if (language === 'en' && i < wordCount - 1) sentence += ' ';
            }
            if (language === 'en') {
                sentence = sentence.charAt(0).toUpperCase() + sentence.slice(1);
            }
            return sentence + (language === 'en' ? '.' : '。');
        }

        function generateParagraph(language) {
            const sentenceCount = Math.floor(Math.random() * 5) + 3;
            let paragraph = '';
            for (let i = 0; i < sentenceCount; i++) {
                paragraph += generateSentence(language);
                if (language === 'en') paragraph += ' ';
            }
            return paragraph.trim();
        }

        function generateLorem() {
            const language = document.querySelector('input[name="language"]:checked').value;
            const type = document.getElementById('type').value;
            const count = Math.max(1, Math.min(20, parseInt(document.getElementById('count').value) || 1));

            let output = '';

            if (type === 'word') {
                const words = [];
                for (let i = 0; i < count; i++) {
                    words.push(getRandomWord(language));
                }
                output = words.join(language === 'en' ? ' ' : '');
            } else if (type === 'sentence') {
                const sentences = [];
                for (let i = 0; i < count; i++) {
                    sentences.push(generateSentence(language));
                }
                output = sentences.join(language === 'en' ? ' ' : '');
            } else {
                const paragraphs = [];
                for (let i = 0; i < count; i++) {
                    paragraphs.push(generateParagraph(language));
                }
                output = paragraphs.join('\n\n');
            }

            document.getElementById('output').textContent = output;
        }

        function copyOutput() {
            const output = document.getElementById('output').textContent;
            if (!output) {
                showToast('コピーするテキストがありません');
                return;
            }
            navigator.clipboard.writeText(output).then(() => {
                showToast('コピーしました');
            }).catch(() => {
                showToast('コピーに失敗しました');
            });
        }

        generateLorem();
    </script>
</body>
</html>
