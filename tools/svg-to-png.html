<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG → PNG変換 - ToolBox</title>
    <meta name="description" content="SVGをPNG形式に変換するオンラインツール。サイズ倍率調整や背景色の選択が可能。">
    <link rel="canonical" href="https://web-tool-site.com/tools/svg-to-png.html">
    <meta property="og:title" content="SVG → PNG変換 - ToolBox">
    <meta property="og:description" content="SVGをPNG形式に変換するオンラインツール。サイズ倍率調整や背景色の選択が可能。">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://web-tool-site.com/tools/svg-to-png.html">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .tool-page {
            padding: 2rem;
            max-width: 900px;
            margin: 0 auto;
        }

        .tool-container {
            background: white;
            border-radius: 8px;
            padding: 2rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .input-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .input-method {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .drop-zone {
            border: 2px dashed #ccc;
            border-radius: 8px;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background-color: #f9f9f9;
            min-height: 150px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .drop-zone:hover,
        .drop-zone.dragover {
            border-color: #0066cc;
            background-color: #f0f4ff;
        }

        .drop-zone input[type="file"] {
            display: none;
        }

        textarea {
            width: 100%;
            padding: 1rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            resize: vertical;
            min-height: 200px;
        }

        .form-group {
            margin: 1.5rem 0;
        }

        label {
            display: block;
            font-weight: 500;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        input[type="number"],
        select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: inherit;
            font-size: 1rem;
            box-sizing: border-box;
        }

        .size-options {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.5rem;
            margin: 1rem 0;
        }

        .size-btn {
            padding: 0.75rem;
            background-color: #f0f0f0;
            color: #333;
            border: 2px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
        }

        .size-btn:hover {
            border-color: #0066cc;
            background-color: #f0f4ff;
        }

        .size-btn.active {
            background-color: #0066cc;
            color: white;
            border-color: #0066cc;
        }

        .custom-size {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .background-options {
            display: flex;
            gap: 1rem;
            margin: 1rem 0;
        }

        .bg-btn {
            flex: 1;
            padding: 0.75rem;
            background-color: #f0f0f0;
            color: #333;
            border: 2px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
        }

        .bg-btn:hover {
            border-color: #0066cc;
            background-color: #f0f4ff;
        }

        .bg-btn.active {
            background-color: #0066cc;
            color: white;
            border-color: #0066cc;
        }

        .preview-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin: 2rem 0;
        }

        .preview-item {
            text-align: center;
            padding: 1.5rem;
            background-color: #f9f9f9;
            border-radius: 8px;
        }

        .preview-item h3 {
            margin-bottom: 1rem;
            color: #333;
        }

        .preview-canvas {
            max-width: 100%;
            max-height: 300px;
            border: 1px solid #ddd;
            border-radius: 4px;
            margin: 1rem 0;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .preview-info {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: #666;
        }

        .preview-info div {
            margin: 0.5rem 0;
        }

        button {
            padding: 0.75rem 1.5rem;
            background-color: #0066cc;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #0052a3;
        }

        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        .button-group {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            flex-wrap: wrap;
        }

        .ad-banner {
            margin: 2rem 0;
            background-color: #f5f5f5;
            border-radius: 8px;
            padding: 1rem;
        }

        .ad-placeholder {
            background-color: #e0e0e0;
            border: 1px dashed #999;
            padding: 2rem;
            text-align: center;
            color: #666;
            border-radius: 4px;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #333;
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 4px;
            display: none;
            z-index: 1000;
            animation: slideIn 0.3s ease-out;
        }

        .toast.show {
            display: block;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1.5rem;
            font-weight: 700;
            text-decoration: none;
            color: #333;
        }

        .logo svg {
            width: 28px;
            height: 28px;
            color: #0066cc;
        }

        nav {
            display: flex;
            gap: 2rem;
        }

        nav a {
            text-decoration: none;
            color: #666;
            font-weight: 500;
            transition: color 0.3s;
        }

        nav a:hover {
            color: #0066cc;
        }

        footer {
            background-color: #f5f5f5;
            padding: 2rem;
            text-align: center;
            border-top: 1px solid #eee;
            margin-top: 2rem;
        }

        footer a {
            color: #0066cc;
            text-decoration: none;
            margin: 0 1rem;
        }

        footer a:hover {
            text-decoration: underline;
        }

        .footer-info {
            color: #666;
            font-size: 0.9rem;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: #333;
        }

        .error-message {
            color: #dc3545;
            padding: 1rem;
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
            border-radius: 4px;
            margin: 1rem 0;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        @media (max-width: 768px) {
            .input-section {
                grid-template-columns: 1fr;
            }

            .preview-section {
                grid-template-columns: 1fr;
            }

            .size-options {
                grid-template-columns: repeat(2, 1fr);
            }

            .background-options {
                flex-direction: column;
            }

            .button-group {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <header>
        <a href="../index.html" class="logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/>
            </svg>
            ToolBox
        </a>
        <nav>
            <a href="../index.html">ホーム</a>
            <a href="../index.html#tools">ツール一覧</a>
        </nav>
    </header>

    <div class="tool-page">
        <div class="ad-banner">
            <div class="ad-placeholder">広告スペース（Google AdSense）</div>
        </div>

        <div class="tool-container">
            <h1>SVG → PNG変換</h1>

            <div class="error-message" id="errorMessage"></div>

            <div class="input-section">
                <div class="input-method">
                    <label>SVGコードを貼り付け</label>
                    <textarea id="svgCode" placeholder="ここにSVGコードを貼り付けてください..."></textarea>
                    <button onclick="loadFromTextarea()" style="width: 100%;">テキストから読み込む</button>
                </div>

                <div class="input-method">
                    <label>またはSVGファイルをアップロード</label>
                    <div class="drop-zone" id="dropZone">
                        <p>SVGファイルをドラッグ＆ドロップするか、ここをクリック</p>
                        <input type="file" id="fileInput" accept=".svg">
                    </div>
                </div>
            </div>

            <div id="settingsSection" style="display: none;">
                <div class="form-group">
                    <label>出力サイズ（倍率）</label>
                    <div class="size-options">
                        <button class="size-btn" data-scale="1">1x</button>
                        <button class="size-btn" data-scale="2">2x</button>
                        <button class="size-btn" data-scale="3">3x</button>
                        <button class="size-btn" data-scale="4">4x</button>
                    </div>
                </div>

                <div class="form-group">
                    <label>カスタムサイズ</label>
                    <div class="custom-size">
                        <div>
                            <label for="customWidth" style="font-size: 0.85rem;">幅 (px)</label>
                            <input type="number" id="customWidth" min="1">
                        </div>
                        <div>
                            <label for="customHeight" style="font-size: 0.85rem;">高さ (px)</label>
                            <input type="number" id="customHeight" min="1">
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label>背景色</label>
                    <div class="background-options">
                        <button class="bg-btn active" data-bg="transparent">透明</button>
                        <button class="bg-btn" data-bg="white">白</button>
                    </div>
                </div>

                <div class="preview-section" id="previewSection">
                    <div class="preview-item">
                        <h3>SVGプレビュー</h3>
                        <div id="svgPreview" style="max-width: 100%; max-height: 300px; overflow: auto;"></div>
                        <div class="preview-info" id="svgInfo"></div>
                    </div>
                    <div class="preview-item">
                        <h3>PNG プレビュー</h3>
                        <canvas id="previewCanvas" class="preview-canvas"></canvas>
                        <div class="preview-info">
                            幅: <span id="pngWidth">-</span>px<br>
                            高さ: <span id="pngHeight">-</span>px<br>
                            ファイルサイズ: <span id="pngSize">-</span>
                        </div>
                    </div>
                </div>

                <div class="button-group">
                    <button id="convertBtn" style="flex: 1;">PNG に変換</button>
                    <button id="downloadBtn" style="flex: 1;">ダウンロード</button>
                </div>
            </div>
        </div>

        <div class="ad-banner">
            <div class="ad-placeholder">広告スペース（Google AdSense）</div>
        </div>
    </div>

    <footer>
        <div>
            <a href="../index.html">ホーム</a>
            <a href="../index.html#tools">ツール一覧</a>
            <a href="../privacy.html">プライバシーポリシー</a>
        </div>
        <div class="footer-info" style="margin-top: 1rem;">© 2026 ToolBox</div>
    </footer>

    <div class="toast" id="toast"></div>

    <script>
        let svgContent = '';
        let svgDimensions = { width: 100, height: 100 };
        let convertedBlob = null;
        let currentScale = 1;
        let currentBg = 'transparent';

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function showError(message) {
            const errorElement = document.getElementById('errorMessage');
            errorElement.textContent = message;
            errorElement.classList.add('show');
            setTimeout(() => errorElement.classList.remove('show'), 5000);
        }

        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');

        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                loadFromFile(e.dataTransfer.files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                loadFromFile(e.target.files[0]);
            }
        });

        function loadFromFile(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                svgContent = e.target.result;
                processSVG();
            };
            reader.onerror = () => showError('ファイルの読み込みに失敗しました');
            reader.readAsText(file);
        }

        function loadFromTextarea() {
            svgContent = document.getElementById('svgCode').value.trim();
            if (!svgContent) {
                showError('SVGコードを入力してください');
                return;
            }
            processSVG();
        }

        function processSVG() {
            try {
                const parser = new DOMParser();
                const doc = parser.parseFromString(svgContent, 'text/xml');

                if (doc.getElementsByTagName('parsererror').length > 0) {
                    showError('無効なSVGコードです');
                    return;
                }

                const svgElement = doc.querySelector('svg');
                if (!svgElement) {
                    showError('SVG要素が見つかりません');
                    return;
                }

                const viewBox = svgElement.getAttribute('viewBox');
                let width = parseInt(svgElement.getAttribute('width')) || 100;
                let height = parseInt(svgElement.getAttribute('height')) || 100;

                if (viewBox) {
                    const parts = viewBox.split(/\s+/);
                    if (parts.length >= 4) {
                        width = parseInt(parts[2]) || width;
                        height = parseInt(parts[3]) || height;
                    }
                }

                svgDimensions = { width, height };

                const preview = document.getElementById('svgPreview');
                preview.innerHTML = '';
                preview.appendChild(doc.documentElement.cloneNode(true));

                document.getElementById('svgInfo').innerHTML = `
                    幅: ${width}px<br>
                    高さ: ${height}px
                `;

                document.getElementById('customWidth').value = width;
                document.getElementById('customHeight').value = height;

                document.getElementById('settingsSection').style.display = 'block';
                updatePreview();
                showToast('SVGを読み込みました');
            } catch (error) {
                showError('SVGの処理に失敗しました: ' + error.message);
            }
        }

        document.querySelectorAll('.size-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentScale = parseFloat(btn.dataset.scale);
                document.getElementById('customWidth').value = Math.round(svgDimensions.width * currentScale);
                document.getElementById('customHeight').value = Math.round(svgDimensions.height * currentScale);
                updatePreview();
            });
        });

        document.querySelectorAll('.bg-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.bg-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentBg = btn.dataset.bg;
                updatePreview();
            });
        });

        document.getElementById('customWidth').addEventListener('input', updatePreview);
        document.getElementById('customHeight').addEventListener('input', updatePreview);

        function updatePreview() {
            if (!svgContent) return;

            const width = parseInt(document.getElementById('customWidth').value) || svgDimensions.width;
            const height = parseInt(document.getElementById('customHeight').value) || svgDimensions.height;

            const canvas = document.getElementById('previewCanvas');
            const ctx = canvas.getContext('2d');

            canvas.width = width;
            canvas.height = height;

            const bgColor = currentBg === 'transparent' ? 'rgba(0,0,0,0)' : '#ffffff';
            ctx.fillStyle = bgColor;
            ctx.fillRect(0, 0, width, height);

            const blob = new Blob([svgContent], { type: 'image/svg+xml' });
            const url = URL.createObjectURL(blob);
            const img = new Image();
            img.onload = () => {
                ctx.drawImage(img, 0, 0, width, height);
                URL.revokeObjectURL(url);

                canvas.toBlob((blob) => {
                    document.getElementById('pngSize').textContent = formatFileSize(blob.size);
                }, 'image/png');
            };
            img.src = url;

            document.getElementById('pngWidth').textContent = width;
            document.getElementById('pngHeight').textContent = height;
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round((bytes / Math.pow(k, i)) * 100) / 100 + ' ' + sizes[i];
        }

        document.getElementById('convertBtn').addEventListener('click', () => {
            if (!svgContent) {
                showError('先にSVGを読み込んでください');
                return;
            }

            const width = parseInt(document.getElementById('customWidth').value);
            const height = parseInt(document.getElementById('customHeight').value);

            const canvas = document.getElementById('previewCanvas');
            const ctx = canvas.getContext('2d');

            canvas.width = width;
            canvas.height = height;

            const bgColor = currentBg === 'transparent' ? 'rgba(0,0,0,0)' : '#ffffff';
            ctx.fillStyle = bgColor;
            ctx.fillRect(0, 0, width, height);

            const blob = new Blob([svgContent], { type: 'image/svg+xml' });
            const url = URL.createObjectURL(blob);
            const img = new Image();
            img.onload = () => {
                ctx.drawImage(img, 0, 0, width, height);
                URL.revokeObjectURL(url);

                canvas.toBlob((blob) => {
                    convertedBlob = blob;
                    showToast('PNG への変換が完了しました');
                    document.getElementById('downloadBtn').disabled = false;
                }, 'image/png');
            };
            img.src = url;
        });

        document.getElementById('downloadBtn').addEventListener('click', () => {
            if (!convertedBlob) {
                showError('先に変換を実行してください');
                return;
            }

            const url = URL.createObjectURL(convertedBlob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `converted-${Date.now()}.png`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('ダウンロードが開始されました');
        });

        // Set initial active state for first size button
        document.querySelector('.size-btn').classList.add('active');
        document.querySelector('.bg-btn').classList.add('active');
    </script>
</body>
</html>
