                    <button class="proto-btn" data-proto="UDP" onclick="setProto(this,'UDP')">UDP</button>

    ];

    let currentRange = 'all';
    let currentProto = 'all';

    function setRange(btn, val) {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentRange = val;
        renderTable();
    }

    function setProto(btn, val) {
        document.querySelectorAll('.proto-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentProto = val;
        renderTable();
    }

    function getPortRange(port) {
        if (port <= 1023) return 'well';
        if (port <= 49151) return 'reg';
        return 'dyn';
    }

    function getRangeLabel(port) {
        if (port <= 1023) return '<span class="range-badge">Well-Known</span>';
        if (port <= 49151) return '<span class="range-badge">Registered</span>';
        return '<span class="range-badge">Dynamic</span>';
    }

    function getProtoClass(proto) {
        if (proto === 'TCP') return 'proto-tcp';
        if (proto === 'UDP') return 'proto-udp';
        return 'proto-both';
    }

    function renderTable() {
        const search = document.getElementById('searchInput').value.trim().toLowerCase();
        const tbody = document.getElementById('portTableBody');
        const noRes = document.getElementById('noResults');

        const filtered = PORT_DATA.filter(([port, proto, svc, desc]) => {
            // Range filter
            if (currentRange !== 'all' && getPortRange(port) !== currentRange) return false;
            // Protocol filter
            if (currentProto !== 'all') {
                if (currentProto === 'TCP/UDP') {
                    if (proto !== 'TCP/UDP') return false;
                } else {
                    if (!proto.includes(currentProto)) return false;
                }
            }
            // Search filter
            if (search) {
                const portStr = String(port);
                const svcLow  = svc.toLowerCase();
                const descLow = desc.toLowerCase();
                if (!portStr.includes(search) && !svcLow.includes(search) && !descLow.includes(search)) return false;
            }
            return true;
        });

        document.getElementById('resultCount').textContent = filtered.length + ' 件のポートが見つかりました';

        if (filtered.length === 0) {
            tbody.innerHTML = '';
            noRes.style.display = 'block';
            return;
        }
        noRes.style.display = 'none';

        tbody.innerHTML = filtered.map(([port, proto, svc, desc]) => {
            const rangeClass = getPortRange(port);
            const protoClass = getProtoClass(proto);
            return `<tr class="${rangeClass}">
                <td><span class="port-num">${port}</span>${getRangeLabel(port)}</td>
                <td><span class="proto-badge ${protoClass}">${proto}</span></td>
                <td class="svc-name">${svc}</td>
                <td>${desc}</td>
            </tr>`;
        }).join('');
    }

    renderTable();
    </script>
