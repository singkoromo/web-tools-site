<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ダミーデータ生成器 - ToolBox</title>
    <meta name="description" content="テスト用のダミーデータを日本語で生成できるツール。名前、メールアドレス、電話番号、住所などを自動生成し、JSON、CSV形式でダウンロードできます。">
    <meta name="keywords" content="ダミーデータ, テストデータ, 生成ツール, 日本語">
    <meta property="og:title" content="ダミーデータ生成器 - ToolBox">
    <meta property="og:description" content="テスト用のダミーデータを日本語で生成できるツール。名前、メールアドレス、電話番号、住所などを自動生成し、JSON、CSV形式でダウンロードできます。">
    <meta property="og:url" content="https://web-tool-site.com/tools/dummy-data.html">
    <meta property="og:type" content="website">
    <link rel="canonical" href="https://web-tool-site.com/tools/dummy-data.html">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .tool-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .tool-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 30px;
            color: #1a1a1a;
        }
        .controls {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }
        .control-group {
            margin-bottom: 20px;
        }
        .control-group:last-child {
            margin-bottom: 0;
        }
        .control-label {
            display: block;
            font-weight: 600;
            margin-bottom: 10px;
            color: #333;
        }
        .checkbox-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-bottom: 12px;
        }
        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        input[type="checkbox"] {
            cursor: pointer;
            width: 18px;
            height: 18px;
        }
        .checkbox-item label {
            cursor: pointer;
            user-select: none;
            font-size: 14px;
        }
        .input-row {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        input[type="number"] {
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            font-family: Inter, sans-serif;
            max-width: 120px;
        }
        .format-options {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .radio-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        input[type="radio"] {
            cursor: pointer;
            width: 18px;
            height: 18px;
        }
        .button-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            font-family: Inter, sans-serif;
            transition: all 0.2s ease;
        }
        .btn-primary {
            background: #0066cc;
            color: white;
        }
        .btn-primary:hover {
            background: #0052a3;
        }
        .btn-secondary {
            background: #e8e8e8;
            color: #333;
        }
        .btn-secondary:hover {
            background: #d5d5d5;
        }
        .results {
            margin-bottom: 30px;
        }
        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .results-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }
        .table-wrapper {
            overflow-x: auto;
            background: white;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            font-family: 'JetBrains Mono', monospace;
        }
        th {
            background: #f5f5f5;
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
            font-weight: 600;
            color: #333;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid #f0f0f0;
            color: #666;
        }
        tr:last-child td {
            border-bottom: none;
        }
        .json-output {
            background: white;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 16px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: #333;
            max-height: 400px;
            overflow-y: auto;
            word-break: break-all;
            white-space: pre-wrap;
        }
        .empty-state {
            color: #999;
            text-align: center;
            padding: 40px 20px;
        }
        .ad-banner {
            background: #f0f0f0;
            border: 2px dashed #ddd;
            padding: 20px;
            text-align: center;
            margin: 30px 0;
            border-radius: 4px;
            color: #666;
            font-size: 13px;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #333;
            color: white;
            padding: 12px 20px;
            border-radius: 4px;
            font-size: 13px;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            z-index: 1000;
        }
        .toast.show {
            opacity: 1;
            pointer-events: auto;
        }
        footer {
            background: #f5f5f5;
            padding: 30px 20px;
            text-align: center;
            color: #666;
            font-size: 13px;
            margin-top: 60px;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <a href="../index.html" class="logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/>
                </svg>
                ToolBox
            </a>
            <nav class="nav">
                <a href="../index.html">ホーム</a>
                <a href="../index.html#tools">ツール一覧</a>
            </nav>
        </div>
    </header>

    <div class="tool-container">
        <h1 class="tool-title">ダミーデータ生成器</h1>

        <div class="ad-banner">
            広告スペース
        </div>

        <div class="controls">
            <div class="control-group">
                <label class="control-label">フィールド選択</label>
                <div class="checkbox-grid">
                    <div class="checkbox-item">
                        <input type="checkbox" id="field-name" checked>
                        <label for="field-name">名前</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="field-email" checked>
                        <label for="field-email">メール</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="field-phone" checked>
                        <label for="field-phone">電話番号</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="field-address" checked>
                        <label for="field-address">住所</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="field-company" checked>
                        <label for="field-company">会社名</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="field-date">
                        <label for="field-date">日付</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="field-number">
                        <label for="field-number">数値</label>
                    </div>
                </div>
            </div>

            <div class="control-group">
                <label class="control-label">レコード数</label>
                <div class="input-row">
                    <input type="number" id="recordCount" min="1" max="100" value="5">
                    <span style="color: #666; font-size: 13px;">1～100</span>
                </div>
            </div>

            <div class="control-group">
                <label class="control-label">出力形式</label>
                <div class="format-options">
                    <div class="radio-item">
                        <input type="radio" name="format" id="format-table" value="table" checked>
                        <label for="format-table">テーブル</label>
                    </div>
                    <div class="radio-item">
                        <input type="radio" name="format" id="format-json" value="json">
                        <label for="format-json">JSON</label>
                    </div>
                    <div class="radio-item">
                        <input type="radio" name="format" id="format-csv" value="csv">
                        <label for="format-csv">CSV</label>
                    </div>
                </div>
            </div>

            <div class="button-group">
                <button class="btn-primary" onclick="generateData()">生成する</button>
                <button class="btn-secondary" id="downloadBtn" onclick="downloadData()" style="display: none;">ダウンロード</button>
                <button class="btn-secondary" onclick="clearData()">クリア</button>
            </div>
        </div>

        <div class="results" id="results"></div>
    </div>

    <div class="ad-banner">
        広告スペース
    </div>

    <footer>
        © 2026 ToolBox. All rights reserved.
    </footer>

    <div class="toast" id="toast"></div>

    <script>
        const firstNames = ['太郎', '花子', '健太', '由美', '翔太', '美咲', '大輔', 'さくら', '拓也', 'あかり', '晴彦', 'あおい', 'おさむ', 'さくら', 'けんしろう'];
        const lastNames = ['田中', '山田', '佐藤', '鈴木', '高橋', '渡辺', '伊藤', '中野', '木村', '林', '小林', '村上', '杉本', '岡本', '西田'];
        const prefectures = ['北海道', '青森県', '岩手県', '宮城県', '秋田県', '山形県', '福島県', '茨城県', '栃木県', '群馬県', '埼玉県', '千葉県', '東京都', '神奈川県', '新潟県', '富山県', '石川県', '福井県', '山梨県', '長野県', '岐阜県', '静岡県', '愛知県', '三重県', '滋賀県', '京都府', '大阪府', '兵庫県', '奈良県', '和歌山県', '鳥取県', '島根県', '岡山県', '広島県', '山口県', '徳島県', '香川県', '愛媛県', '高知県', '福岡県', '佐賀県', '長崎県', '熊本県', '大分県', '宮崎県', '鹿児島県', '沖縄県'];
        const cities = ['東京市', '大阪市', '神戸市', '京都市', '福岡市', '横浜市', '名古屋市', 'さいたま市', '札幌市', '仙台市', '江戸川区', '千代田区', '新宿区', '中央区', '港区', '渋谷区', '品川区', '目黒区', '世田谷区', '杉並区'];
        const companyTypes = ['株式会社', '有限会社', 'LLC', '合同会社'];
        const companyNames = ['テック', 'ソリューション', 'デジタル', 'クラウド', 'グローバル', 'ネクスト', 'インテリジェント', 'パワー', 'スター', 'ブリリアント'];

        let generatedData = [];

        function getRandomItem(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        function generateName() {
            return getRandomItem(lastNames) + ' ' + getRandomItem(firstNames);
        }

        function generateEmail(name) {
            const emailProviders = ['gmail.com', 'yahoo.co.jp', 'outlook.com', 'company.com'];
            const localPart = name.replace(/\s/g, '').toLowerCase() + Math.floor(Math.random() * 999);
            return localPart + '@' + getRandomItem(emailProviders);
        }

        function generatePhone() {
            const area = String(Math.floor(Math.random() * 90) + 10).padStart(2, '0');
            const exchange = String(Math.floor(Math.random() * 9000) + 1000);
            const number = String(Math.floor(Math.random() * 10000)).padStart(4, '0');
            return `090-${exchange}-${number}`;
        }

        function generateAddress() {
            const prefecture = getRandomItem(prefectures);
            const city = getRandomItem(cities);
            const number = Math.floor(Math.random() * 999) + 1;
            return `${prefecture}${city}${number}番地`;
        }

        function generateCompany() {
            const type = getRandomItem(companyTypes);
            const name = getRandomItem(companyNames);
            return type + name;
        }

        function generateDate() {
            const start = new Date(2020, 0, 1);
            const end = new Date();
            const date = new Date(start.getTime() + Math.random() * (end.getTime() - start.getTime()));
            return date.toISOString().split('T')[0];
        }

        function generateNumber() {
            return Math.floor(Math.random() * 100000);
        }

        function getSelectedFields() {
            const fields = {};
            if (document.getElementById('field-name').checked) fields.name = true;
            if (document.getElementById('field-email').checked) fields.email = true;
            if (document.getElementById('field-phone').checked) fields.phone = true;
            if (document.getElementById('field-address').checked) fields.address = true;
            if (document.getElementById('field-company').checked) fields.company = true;
            if (document.getElementById('field-date').checked) fields.date = true;
            if (document.getElementById('field-number').checked) fields.number = true;
            return fields;
        }

        function generateRecord(fields) {
            const record = {};
            if (fields.name) {
                record.name = generateName();
            }
            if (fields.email) {
                record.email = generateEmail(record.name || '');
            }
            if (fields.phone) {
                record.phone = generatePhone();
            }
            if (fields.address) {
                record.address = generateAddress();
            }
            if (fields.company) {
                record.company = generateCompany();
            }
            if (fields.date) {
                record.date = generateDate();
            }
            if (fields.number) {
                record.number = generateNumber();
            }
            return record;
        }

        function generateData() {
            const count = Math.min(Math.max(parseInt(document.getElementById('recordCount').value) || 1, 1), 100);
            const fields = getSelectedFields();

            if (Object.keys(fields).length === 0) {
                showToast('最低1つのフィールドを選択してください');
                return;
            }

            generatedData = [];
            for (let i = 0; i < count; i++) {
                generatedData.push(generateRecord(fields));
            }

            renderResults(fields);
            document.getElementById('downloadBtn').style.display = 'inline-block';
        }

        function renderResults(fields) {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '';

            const format = document.querySelector('input[name="format"]:checked').value;

            const header = document.createElement('div');
            header.className = 'results-header';
            header.innerHTML = `<div class="results-title">生成データ (${generatedData.length}件)</div>`;
            resultsDiv.appendChild(header);

            if (format === 'table') {
                const wrapper = document.createElement('div');
                wrapper.className = 'table-wrapper';
                const table = document.createElement('table');

                const thead = document.createElement('thead');
                const headerRow = document.createElement('tr');
                Object.keys(fields).forEach(field => {
                    const th = document.createElement('th');
                    const fieldLabel = {
                        name: '名前',
                        email: 'メール',
                        phone: '電話番号',
                        address: '住所',
                        company: '会社名',
                        date: '日付',
                        number: '数値'
                    }[field];
                    th.textContent = fieldLabel;
                    headerRow.appendChild(th);
                });
                thead.appendChild(headerRow);
                table.appendChild(thead);

                const tbody = document.createElement('tbody');
                generatedData.forEach(record => {
                    const row = document.createElement('tr');
                    Object.keys(fields).forEach(field => {
                        const td = document.createElement('td');
                        td.textContent = record[field] || '';
                        row.appendChild(td);
                    });
                    tbody.appendChild(row);
                });
                table.appendChild(tbody);

                wrapper.appendChild(table);
                resultsDiv.appendChild(wrapper);
            } else if (format === 'json') {
                const jsonOutput = document.createElement('div');
                jsonOutput.className = 'json-output';
                jsonOutput.textContent = JSON.stringify(generatedData, null, 2);
                resultsDiv.appendChild(jsonOutput);
            } else if (format === 'csv') {
                const fields_array = Object.keys(fields);
                let csv = fields_array.join(',') + '\n';
                generatedData.forEach(record => {
                    csv += fields_array.map(field => {
                        const value = record[field] || '';
                        if (typeof value === 'string' && (value.includes(',') || value.includes('"') || value.includes('\n'))) {
                            return '"' + value.replace(/"/g, '""') + '"';
                        }
                        return value;
                    }).join(',') + '\n';
                });

                const csvOutput = document.createElement('div');
                csvOutput.className = 'json-output';
                csvOutput.textContent = csv;
                resultsDiv.appendChild(csvOutput);
            }
        }

        function downloadData() {
            const format = document.querySelector('input[name="format"]:checked').value;
            const fields = getSelectedFields();
            let content = '';
            let filename = '';
            let mimeType = '';

            if (format === 'json') {
                content = JSON.stringify(generatedData, null, 2);
                filename = 'dummy-data.json';
                mimeType = 'application/json';
            } else if (format === 'csv') {
                const fields_array = Object.keys(fields);
                content = fields_array.join(',') + '\n';
                generatedData.forEach(record => {
                    content += fields_array.map(field => {
                        const value = record[field] || '';
                        if (typeof value === 'string' && (value.includes(',') || value.includes('"') || value.includes('\n'))) {
                            return '"' + value.replace(/"/g, '""') + '"';
                        }
                        return value;
                    }).join(',') + '\n';
                });
                filename = 'dummy-data.csv';
                mimeType = 'text/csv';
            } else {
                showToast('テーブル形式はダウンロードできません');
                return;
            }

            const blob = new Blob([content], { type: mimeType });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast('ダウンロードしました');
        }

        function clearData() {
            generatedData = [];
            document.getElementById('results').innerHTML = '';
            document.getElementById('downloadBtn').style.display = 'none';
            showToast('クリアしました');
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        document.querySelectorAll('input[name="format"]').forEach(radio => {
            radio.addEventListener('change', () => {
                if (generatedData.length > 0) {
                    const fields = getSelectedFields();
                    renderResults(fields);
                }
            });
        });
    </script>
</body>
</html>
