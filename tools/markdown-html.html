<body>

    <div class="container">
        <h1 class="tool-title">Markdown↔HTML変換</h1>

        <div class="ad-banner">広告スペース: Markdown-HTML変換ツール</div>

        <div class="editor-section">
            <div class="editor">
                <div class="editor-title">Markdown</div>
                <textarea id="mdInput" placeholder="Markdownテキストを入力してください..."></textarea>
                <div class="button-group">
                    <button class="btn btn-primary" id="mdToHtmlBtn">MD → HTML</button>
                    <button class="btn btn-secondary" id="mdCopyBtn">コピー</button>
                </div>

            </div>

            <div class="editor">
                <div class="editor-title">HTML</div>
                <textarea id="htmlInput" placeholder="HTMLコードがここに表示されます..."></textarea>
                <div class="button-group">
                    <button class="btn btn-primary" id="htmlToMdBtn">HTML → MD</button>
                    <button class="btn btn-secondary" id="htmlCopyBtn">コピー</button>
                </div>
                <div class="error" id="htmlError"></div>
            </div>

            <div class="editor">
                <div class="editor-title">プレビュー</div>
                <div class="preview" id="preview"></div>
            </div>

        <div class="ad-banner">広告スペース: Markdown-HTML変換ツール下部</div>

    <script>
        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        function hideError(id) {
            document.getElementById(id).classList.remove('show');
        }

        function showError(id, message) {
            const error = document.getElementById(id);
            error.textContent = message;
            error.classList.add('show');
        }

        function markdownToHTML(md) {
            let html = md;

            // Code blocks
            html = html.replace(/```([^`]*?)```/gs, '<pre><code>$1</code></pre>');

            // Inline code
            html = html.replace(/`([^`]+?)`/g, '<code>$1</code>');

            // Bold
            html = html.replace(/\*\*([^\*]+?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/__([^_]+?)__/g, '<strong>$1</strong>');

            // Italic
            html = html.replace(/\*([^\*]+?)\*/g, '<em>$1</em>');
            html = html.replace(/_([^_]+?)_/g, '<em>$1</em>');

            // Headings
            html = html.replace(/^### (.*?)$/gm, '<h3>$1</h3>');
            html = html.replace(/^## (.*?)$/gm, '<h2>$1</h2>');
            html = html.replace(/^# (.*?)$/gm, '<h1>$1</h1>');

            // Horizontal rule
            html = html.replace(/^---$/gm, '<hr>');

            // Links and images
            html = html.replace(/!\[([^\]]*)\]\(([^\)]+)\)/g, '<img src="$2" alt="$1">');
            html = html.replace(/\[([^\]]+)\]\(([^\)]+)\)/g, '<a href="$2">$1</a>');

            // Blockquotes
            html = html.replace(/^> (.*?)$/gm, '<blockquote>$1</blockquote>');

            // Lists
            html = html.replace(/^\* (.*?)$/gm, '<li>$1</li>');
            html = html.replace(/^- (.*?)$/gm, '<li>$1</li>');
            html = html.replace(/^\d+\. (.*?)$/gm, '<li>$1</li>');

            // Wrap consecutive list items
            html = html.replace(/(<li>.*?<\/li>)/s, (match) => {
                const hasUl = match.includes('•') || match.match(/^- /m);
                return '<ul>' + match + '</ul>';
            });

            // Paragraphs
            html = html.replace(/^(?!<[h|b|u|o|p|l|t|d])(.+?)$/gm, '<p>$1</p>');

            // Merge consecutive lists/blockquotes
            html = html.replace(/<\/ul>\n<ul>/g, '');
            html = html.replace(/<\/blockquote>\n<blockquote>/g, '');

            return html;
        }

        function htmlToMarkdown(html) {
            let md = html;

            // Remove HTML comments
            md = md.replace(/<!--.*?-->/gs, '');

            // Headings
            md = md.replace(/<h1[^>]*>(.*?)<\/h1>/gi, '# $1\n');
            md = md.replace(/<h2[^>]*>(.*?)<\/h2>/gi, '## $1\n');
            md = md.replace(/<h3[^>]*>(.*?)<\/h3>/gi, '### $1\n');
            md = md.replace(/<h4[^>]*>(.*?)<\/h4>/gi, '#### $1\n');

            // Images
            md = md.replace(/<img[^>]*src="([^"]*)"[^>]*alt="([^"]*)"[^>]*>/gi, '![$2]($1)');
            md = md.replace(/<img[^>]*src="([^"]*)"[^>]*>/gi, '![]($1)');

            // Links
            md = md.replace(/<a[^>]*href="([^"]*)"[^>]*>(.*?)<\/a>/gi, '[$2]($1)');

            // Bold
            md = md.replace(/<strong[^>]*>(.*?)<\/strong>/gi, '**$1**');
            md = md.replace(/<b[^>]*>(.*?)<\/b>/gi, '**$1**');

            // Italic
            md = md.replace(/<em[^>]*>(.*?)<\/em>/gi, '*$1*');
            md = md.replace(/<i[^>]*>(.*?)<\/i>/gi, '*$1*');

            // Code blocks
            md = md.replace(/<pre[^>]*><code[^>]*>(.*?)<\/code><\/pre>/gis, '```\n$1\n```');

            // Inline code
            md = md.replace(/<code[^>]*>(.*?)<\/code>/gi, '`$1`');

            // Lists
            md = md.replace(/<ul[^>]*>/gi, '');
            md = md.replace(/<ol[^>]*>/gi, '');
            md = md.replace(/<\/ul>/gi, '');
            md = md.replace(/<\/ol>/gi, '');
            md = md.replace(/<li[^>]*>(.*?)<\/li>/gi, '- $1\n');

            // Blockquotes
            md = md.replace(/<blockquote[^>]*>(.*?)<\/blockquote>/gis, '> $1\n');

            // Paragraphs
            md = md.replace(/<p[^>]*>(.*?)<\/p>/gi, '$1\n');

            // Horizontal rules
            md = md.replace(/<hr[^>]*>/gi, '---\n');

            // Remove extra tags
            md = md.replace(/<[^>]*>/g, '');

            // Clean up whitespace
            md = md.replace(/\n{3,}/g, '\n\n').trim();

            return md;
        }

        const mdInput = document.getElementById('mdInput');
        const htmlInput = document.getElementById('htmlInput');
        const preview = document.getElementById('preview');

        function updatePreview() {
            const md = mdInput.value;
            if (md.trim()) {
                const html = markdownToHTML(md);
                preview.innerHTML = html;
            } else {
                preview.innerHTML = '';
            }
        }

        document.getElementById('mdToHtmlBtn').addEventListener('click', () => {
            hideError('mdError');
            const md = mdInput.value;
            if (!md.trim()) {
                showError('mdError', 'Markdownが空です');
                return;
            }
            const html = markdownToHTML(md);
            htmlInput.value = html;
            hideError('htmlError');
            updatePreview();
        });

        document.getElementById('htmlToMdBtn').addEventListener('click', () => {
            hideError('htmlError');
            const html = htmlInput.value;
            if (!html.trim()) {
                showError('htmlError', 'HTMLが空です');
                return;
            }
            const md = htmlToMarkdown(html);
            mdInput.value = md;
            hideError('mdError');
            updatePreview();
        });

        document.getElementById('mdCopyBtn').addEventListener('click', () => {
            if (mdInput.value) {
                navigator.clipboard.writeText(mdInput.value);
                showToast('Markdownをコピーしました');
            }
        });

        document.getElementById('htmlCopyBtn').addEventListener('click', () => {
            if (htmlInput.value) {
                navigator.clipboard.writeText(htmlInput.value);
                showToast('HTMLをコピーしました');
            }
        });

        mdInput.addEventListener('input', updatePreview);
    </script>
</body>
</html>
