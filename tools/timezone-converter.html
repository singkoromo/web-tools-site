    <div class="toast" id="toast"></div>
    <script>
    function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';setTimeout(()=>{t.style.display='none';},2000);}

    const tzGroups = [
        { group: "UTC", zones: [{ value: "UTC", label: "UTC（協定世界時）" }] },
        { group: "アメリカ", zones: [
            { value: "America/New_York", label: "ニューヨーク (ET)" },
            { value: "America/Chicago", label: "シカゴ (CT)" },
            { value: "America/Denver", label: "デンバー (MT)" },
            { value: "America/Los_Angeles", label: "ロサンゼルス (PT)" },
            { value: "America/Sao_Paulo", label: "サンパウロ (BRT)" },
            { value: "America/Toronto", label: "トロント (ET)" },
            { value: "America/Vancouver", label: "バンクーバー (PT)" },
            { value: "America/Mexico_City", label: "メキシコシティ (CST)" },
            { value: "Pacific/Honolulu", label: "ホノルル (HST)" }
        ]},
        { group: "ヨーロッパ", zones: [
            { value: "Europe/London", label: "ロンドン (GMT/BST)" },
            { value: "Europe/Paris", label: "パリ (CET)" },
            { value: "Europe/Berlin", label: "ベルリン (CET)" },
            { value: "Europe/Amsterdam", label: "アムステルダム (CET)" },
            { value: "Europe/Rome", label: "ローマ (CET)" },
            { value: "Europe/Moscow", label: "モスクワ (MSK)" }
        ]},
        { group: "アフリカ・中東", zones: [
            { value: "Africa/Cairo", label: "カイロ (EET)" },
            { value: "Asia/Dubai", label: "ドバイ (GST)" }
        ]},
        { group: "アジア", zones: [
            { value: "Asia/Kolkata", label: "コルカタ (IST)" },
            { value: "Asia/Dhaka", label: "ダッカ (BST)" },
            { value: "Asia/Bangkok", label: "バンコク (ICT)" },
            { value: "Asia/Singapore", label: "シンガポール (SGT)" },
            { value: "Asia/Tokyo", label: "東京 (JST)" },
            { value: "Asia/Seoul", label: "ソウル (KST)" },
            { value: "Asia/Shanghai", label: "上海 (CST)" },
            { value: "Asia/Hong_Kong", label: "香港 (HKT)" },
            { value: "Asia/Taipei", label: "台北 (CST)" }
        ]},
        { group: "オセアニア", zones: [
            { value: "Australia/Sydney", label: "シドニー (AEST)" },
            { value: "Australia/Melbourne", label: "メルボルン (AEST)" },
            { value: "Pacific/Auckland", label: "オークランド (NZST)" }
        ]}
    ];

    const worldClockCities = [
        { tz: "Asia/Tokyo", city: "東京", flag: "🇯🇵" },
        { tz: "America/New_York", city: "ニューヨーク", flag: "🇺🇸" },
        { tz: "Europe/London", city: "ロンドン", flag: "🇬🇧" },
        { tz: "Europe/Paris", city: "パリ", flag: "🇫🇷" },
        { tz: "Asia/Dubai", city: "ドバイ", flag: "🇦🇪" },
        { tz: "Asia/Singapore", city: "シンガポール", flag: "🇸🇬" },
        { tz: "Australia/Sydney", city: "シドニー", flag: "🇦🇺" },
        { tz: "America/Los_Angeles", city: "ロサンゼルス", flag: "🇺🇸" },
        { tz: "America/Chicago", city: "シカゴ", flag: "🇺🇸" },
        { tz: "Asia/Seoul", city: "ソウル", flag: "🇰🇷" }
    ];

    function buildSelects() {
        const fromSel = document.getElementById('fromTz');
        const toSel = document.getElementById('toTzDisplay');
        tzGroups.forEach(group => {
            const og1 = document.createElement('optgroup');
            og1.label = group.group;
            const og2 = document.createElement('optgroup');
            og2.label = group.group;
            group.zones.forEach(z => {
                const o1 = document.createElement('option');
                o1.value = z.value; o1.textContent = z.label;
                const o2 = document.createElement('option');
                o2.value = z.value; o2.textContent = z.label;
                og1.appendChild(o1);
                og2.appendChild(o2);
            });
            fromSel.appendChild(og1);
            toSel.appendChild(og2);
        });
        fromSel.value = 'Asia/Tokyo';
        toSel.value = 'America/New_York';
    }

    function setCurrentTime() {
        const now = new Date();
        const pad = n => String(n).padStart(2, '0');
        const local = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}T${pad(now.getHours())}:${pad(now.getMinutes())}`;
        document.getElementById('dateTimeInput').value = local;
        showToast('現在時刻を設定しました');
    }

    function getUtcOffset(tz, date) {
        try {
            const utcStr = date.toLocaleString('en-US', { timeZone: 'UTC' });
            const tzStr = date.toLocaleString('en-US', { timeZone: tz });
            const diff = (new Date(tzStr) - new Date(utcStr)) / 60000;
            const h = Math.floor(Math.abs(diff) / 60);
            const m = Math.abs(diff) % 60;
            const sign = diff >= 0 ? '+' : '-';
            return `UTC${sign}${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
        } catch(e) { return 'N/A'; }
    }

    function convertTime() {
        const dtInput = document.getElementById('dateTimeInput').value;
        if (!dtInput) { showToast('日時を入力してください'); return; }
        const fromTz = document.getElementById('fromTz').value;

        // Parse the datetime-local value as if it's in the fromTz timezone
        const [datePart, timePart] = dtInput.split('T');
        const [yr, mo, da] = datePart.split('-').map(Number);
        const [hr, mi] = timePart.split(':').map(Number);

        // Get UTC equivalent: find what UTC time corresponds to this local time in fromTz
        // We do this by creating a UTC date, then computing the difference
        const utcGuess = new Date(Date.UTC(yr, mo-1, da, hr, mi, 0));
        const tzGuessStr = utcGuess.toLocaleString('en-US', { timeZone: fromTz });
        const tzGuessDate = new Date(tzGuessStr);
        const diffMs = utcGuess - tzGuessDate;
        const inputUTC = new Date(utcGuess.getTime() + diffMs);

        const allZones = tzGroups.flatMap(g => g.zones);
        const tbody = document.getElementById('resultBody');
        tbody.innerHTML = '';

        allZones.forEach(z => {
            try {
                const fmt = new Intl.DateTimeFormat('ja-JP', {
                    timeZone: z.value,
                    year: 'numeric', month: '2-digit', day: '2-digit',
                    hour: '2-digit', minute: '2-digit', second: '2-digit',
                    hour12: false, weekday: 'short'
                });
                const formatted = fmt.format(inputUTC);
                const offset = getUtcOffset(z.value, inputUTC);
                const tr = document.createElement('tr');
                if (z.value === fromTz) tr.className = 'source-row';
                tr.innerHTML = `<td>${z.value === fromTz ? '▶ ' : ''}${z.label}</td><td>${formatted}</td><td>${offset}</td>`;
                tbody.appendChild(tr);
            } catch(e) {}
        });

        document.getElementById('conversionResult').style.display = 'block';
    }

    function swapTz() {
        const f = document.getElementById('fromTz');
        const t = document.getElementById('toTzDisplay');
        const tmp = f.value; f.value = t.value; t.value = tmp;
        showToast('タイムゾーンを入れ替えました');
    }

    function buildWorldClock() {
        const container = document.getElementById('worldClock');
        worldClockCities.forEach(c => {
            const key = c.tz.replace(/\//g, '-');
            const div = document.createElement('div');
            div.className = 'clock-card';
            div.innerHTML = `<div class="city">${c.flag} ${c.city}</div><div class="time" id="time-${key}">--:--:--</div><div class="date-str" id="date-${key}">----/--/--</div><div class="tz-label">${c.tz}</div>`;
            container.appendChild(div);
        });
    }

    function updateWorldClock() {
        const now = new Date();
        worldClockCities.forEach(c => {
            const key = c.tz.replace(/\//g, '-');
            try {
                const timeFmt = new Intl.DateTimeFormat('ja-JP', { timeZone: c.tz, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
                const dateFmt = new Intl.DateTimeFormat('ja-JP', { timeZone: c.tz, year: 'numeric', month: '2-digit', day: '2-digit', weekday: 'short' });
                const timeEl = document.getElementById('time-' + key);
                const dateEl = document.getElementById('date-' + key);
                if (timeEl) timeEl.textContent = timeFmt.format(now);
                if (dateEl) dateEl.textContent = dateFmt.format(now);
            } catch(e) {}
        });
    }

    buildSelects();
    buildWorldClock();
    setCurrentTime();
    updateWorldClock();
    setInterval(updateWorldClock, 1000);
    </script>
