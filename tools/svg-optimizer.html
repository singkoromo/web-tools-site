            <div class="tool-content">

                <div class="form-group">
                    <span class="label">最適化オプション</span>
                    <div class="options-grid">
                        <label class="option-item"><input type="checkbox" id="optComments" checked> コメント除去</label>

    <div class="toast" id="toast"></div>
    <script>
    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.style.display = 'block';
        setTimeout(() => { t.style.display = 'none'; }, 2000);
    }
    function copyText(text) {
        if (!text) return;
        navigator.clipboard.writeText(text).then(() => showToast('コピーしました')).catch(() => {
            const ta = document.createElement('textarea');
            ta.value = text;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            showToast('コピーしました');
        });
    }

    function showAlert(msg, type) {
        const box = document.getElementById('alertBox');
        box.innerHTML = '<div class="alert alert-' + type + '">' + msg + '</div>';
        setTimeout(() => { box.innerHTML = ''; }, 4000);
    }

    function formatBytes(bytes) {
        if (bytes < 1024) return bytes + ' B';
        return (bytes / 1024).toFixed(2) + ' KB';
    }

    function optimizeSVG() {
        const input = document.getElementById('svgInput').value.trim();
        if (!input) { showAlert('SVGコードを入力してください。', 'danger'); return; }
        if (!input.includes('<svg') && !input.includes('<SVG')) { showAlert('有効なSVGコードではありません。', 'danger'); return; }

        let result = input;
        const optComments  = document.getElementById('optComments').checked;
        const optMetadata  = document.getElementById('optMetadata').checked;
        const optWhitespace = document.getElementById('optWhitespace').checked;
        const optAttrs     = document.getElementById('optAttrs').checked;
        const optViewBox   = document.getElementById('optViewBox').checked;

        // Remove XML comments
        if (optComments) {
            result = result.replace(/<!--[\s\S]*?-->/g, '');
        }

        // Remove metadata elements
        if (optMetadata) {
            result = result.replace(/<metadata[\s\S]*?<\/metadata>/gi, '');
            result = result.replace(/<desc[\s\S]*?<\/desc>/gi, '');
            result = result.replace(/<title[\s\S]*?<\/title>/gi, '');
        }

        // Remove editor-specific namespaces and attributes
        if (optAttrs) {
            // Remove inkscape: and sodipodi: attributes
            result = result.replace(/\s+inkscape:[a-z\-:]+="[^"]*"/g, '');
            result = result.replace(/\s+sodipodi:[a-z\-:]+="[^"]*"/g, '');
            // Remove inkscape/sodipodi namespace declarations
            result = result.replace(/\s+xmlns:inkscape="[^"]*"/g, '');
            result = result.replace(/\s+xmlns:sodipodi="[^"]*"/g, '');
            result = result.replace(/\s+xmlns:dc="[^"]*"/g, '');
            result = result.replace(/\s+xmlns:cc="[^"]*"/g, '');
            result = result.replace(/\s+xmlns:rdf="[^"]*"/g, '');
            // Remove sodipodi elements
            result = result.replace(/<sodipodi:[^>]*\/>/g, '');
            result = result.replace(/<sodipodi:[\s\S]*?<\/sodipodi:[^>]*>/g, '');
        }

        // Normalize viewBox - remove extra spaces inside viewBox value
        if (optViewBox) {
            result = result.replace(/viewBox="([^"]*)"/g, (match, p1) => {
                const normalized = p1.trim().replace(/\s+/g, ' ');
                return 'viewBox="' + normalized + '"';
            });
        }

        // Collapse whitespace
        if (optWhitespace) {
            // Collapse multiple spaces/tabs into one
            result = result.replace(/[ \t]+/g, ' ');
            // Collapse multiple newlines
            result = result.replace(/\n\s*\n/g, '\n');
            // Remove whitespace between tags
            result = result.replace(/>\s+</g, '><');
            result = result.trim();
        }

        const origBytes = new TextEncoder().encode(input).length;
        const optBytes  = new TextEncoder().encode(result).length;
        const saved = origBytes - optBytes;
        const pct = origBytes > 0 ? ((saved / origBytes) * 100).toFixed(1) : '0.0';

        document.getElementById('svgOutput').value = result;

        document.getElementById('origSize').textContent = formatBytes(origBytes);
        document.getElementById('optSize').textContent  = formatBytes(optBytes);
        document.getElementById('reduction').textContent = (saved >= 0 ? '-' : '+') + Math.abs(pct) + '%';
        document.getElementById('statsBar').style.display = 'flex';

        // SVG preview
        const preview = document.getElementById('previewBox');
        try {
            preview.innerHTML = result;
        } catch(e) {
            preview.innerHTML = '<span style="color:#c33;">プレビューを表示できません</span>';
        }

        showAlert('最適化完了！ ' + formatBytes(saved >= 0 ? saved : 0) + ' 削減しました。', 'success');
    }

    function clearAll() {
        document.getElementById('svgInput').value = '';
        document.getElementById('svgOutput').value = '';
        document.getElementById('statsBar').style.display = 'none';
        document.getElementById('alertBox').innerHTML = '';
        document.getElementById('previewBox').innerHTML = '<span style="color:#bbb;font-size:0.9rem;">SVGを最適化するとここにプレビューが表示されます</span>';
    }

    function downloadSVG() {
        const content = document.getElementById('svgOutput').value;
        if (!content) { showAlert('最適化されたSVGがありません。', 'danger'); return; }
        const blob = new Blob([content], { type: 'image/svg+xml' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'optimized.svg';
        a.click();
        URL.revokeObjectURL(url);
    }
    </script>
