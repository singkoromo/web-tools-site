    <script>
    function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';setTimeout(()=>{t.style.display='none';},2000);}
    function copyText(text){navigator.clipboard.writeText(text).then(()=>showToast('コピーしました')).catch(()=>{const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('コピーしました');});}

    const EXAMPLES = {
        query: `query GetUser($id: ID!) {\n  user(id: $id) {\n    id\n    name\n    email\n    posts {\n      id\n      title\n    }\n  }\n}`,
        mutation: `mutation CreatePost($input: PostInput!) {\n  createPost(input: $input) {\n    id\n    title\n    author {\n      name\n    }\n  }\n}`,
        schema: `type Query {\n  user(id: ID!): User\n  users: [User!]!\n  posts: [Post!]!\n}\n\ntype User {\n  id: ID!\n  name: String!\n  email: String!\n  posts: [Post!]!\n}\n\ntype Post {\n  id: ID!\n  title: String!\n  body: String!\n  author: User!\n}`
    };

    function loadExample(type) {
        document.getElementById('inputArea').value = EXAMPLES[type] || '';
        detectType();
        updateInputStats();
        showToast('例を読み込みました');
    }

    function clearAll() {
        document.getElementById('inputArea').value = '';
        document.getElementById('outputArea').value = '';
        document.getElementById('typeBadge').innerHTML = '';
        document.getElementById('statsBar').innerHTML = '';
        document.getElementById('inputStats').textContent = '文字数: 0';
        document.getElementById('outputStats').textContent = '文字数: 0';
    }

    function detectQueryType(src) {
        const stripped = src.replace(/#[^\n]*/g, '').trim();
        if (/^\s*mutation\b/i.test(stripped)) return 'mutation';
        if (/^\s*subscription\b/i.test(stripped)) return 'subscription';
        if (/^\s*fragment\b/i.test(stripped)) return 'fragment';
        if (/^\s*query\b/i.test(stripped) || /^\s*\{/.test(stripped)) return 'query';
        if (/\btype\s+\w+/i.test(stripped) || /\bscalar\s+\w+/i.test(stripped) || /\binterface\s+\w+/i.test(stripped) || /\benum\s+\w+/i.test(stripped) || /\binput\s+\w+/i.test(stripped)) return 'schema';
        return 'unknown';
    }

    const TYPE_INFO = {
        query: { label: 'Query（クエリ）', cls: 'type-query' },
        mutation: { label: 'Mutation（ミューテーション）', cls: 'type-mutation' },
        subscription: { label: 'Subscription（サブスクリプション）', cls: 'type-subscription' },
        schema: { label: 'Schema（スキーマ定義）', cls: 'type-schema' },
        fragment: { label: 'Fragment（フラグメント）', cls: 'type-fragment' },
        unknown: { label: '不明', cls: 'type-unknown' }
    };

    function detectType() {
        const src = document.getElementById('inputArea').value;
        updateInputStats();
        if (!src.trim()) { document.getElementById('typeBadge').innerHTML = ''; document.getElementById('statsBar').innerHTML = ''; return; }
        const t = detectQueryType(src);
        const info = TYPE_INFO[t] || TYPE_INFO.unknown;
        document.getElementById('typeBadge').innerHTML = `<span class="type-badge ${info.cls}">${info.label}</span>`;
        updateStats(src);
    }

    function updateStats(src) {
        const fieldMatches = src.match(/\w+\s*[({]/g) || [];
        const varMatches = src.match(/\$\w+/g) || [];
        const uniqueVars = [...new Set(varMatches)];
        const statsBar = document.getElementById('statsBar');
        statsBar.innerHTML = `
            <span class="stat-badge">フィールド数 約 ${fieldMatches.length}</span>
            <span class="stat-badge">変数数 ${uniqueVars.length}</span>
        `;
    }

    function updateInputStats() {
        const len = document.getElementById('inputArea').value.length;
        document.getElementById('inputStats').textContent = `文字数: ${len.toLocaleString()}`;
    }

    /**
     * GraphQL formatter: character-by-character parsing
     * Handles: strings, comments, braces/parens for indentation
     */
    function formatGraphQL(src, indentSize) {
        const indent = ' '.repeat(indentSize);
        let out = '';
        let depth = 0;
        let i = 0;
        const len = src.length;
        let inString = false;
        let inComment = false;
        let inBlockString = false;

        while (i < len) {
            const ch = src[i];

            // Block string (triple quote)
            if (!inString && !inComment && src.slice(i, i+3) === '"""') {
                if (inBlockString) {
                    out += '"""';
                    inBlockString = false;
                    i += 3;
                } else {
                    out += '"""';
                    inBlockString = true;
                    i += 3;
                }
                continue;
            }

            if (inBlockString) {
                out += ch;
                i++;
                continue;
            }

            // Regular string
            if (ch === '"' && !inComment) {
                inString = !inString;
                out += ch;
                i++;
                continue;
            }

            if (inString) {
                if (ch === '\\') { out += ch + (src[i+1] || ''); i += 2; continue; }
                out += ch;
                i++;
                continue;
            }

            // Comment
            if (ch === '#' && !inString) {
                inComment = true;
                out += ch;
                i++;
                continue;
            }

            if (inComment) {
                if (ch === '\n') {
                    inComment = false;
                    out += '\n' + indent.repeat(depth);
                } else {
                    out += ch;
                }
                i++;
                continue;
            }

            // Skip whitespace/newlines (we'll add our own)
            if (ch === ' ' || ch === '\t' || ch === '\r' || ch === '\n') {
                // Add a space if previous non-space char could use one
                const last = out.trimEnd().slice(-1);
                if (last && last !== '{' && last !== '(' && last !== '\n' && !out.endsWith('\n' + indent.repeat(depth))) {
                    // We'll handle spacing via context below
                }
                i++;
                continue;
            }

            if (ch === '{') {
                // Remove trailing spaces before brace
                out = out.trimEnd();
                out += ' {\n';
                depth++;
                out += indent.repeat(depth);
                i++;
                continue;
            }

            if (ch === '}') {
                out = out.trimEnd();
                out += '\n';
                depth = Math.max(0, depth - 1);
                out += indent.repeat(depth) + '}';
                i++;
                // Peek: if next non-space is not }, add newline
                let j = i;
                while (j < len && (src[j] === ' ' || src[j] === '\t' || src[j] === '\r' || src[j] === '\n')) j++;
                if (j < len && src[j] !== '}' && src[j] !== ')') {
                    out += '\n' + (depth > 0 ? indent.repeat(depth) : '');
                }
                continue;
            }

            if (ch === '(') {
                out += '(';
                i++;
                continue;
            }

            if (ch === ')') {
                out += ')';
                i++;
                continue;
            }

            if (ch === ',') {
                // In field lists, newline instead of comma
                out = out.trimEnd();
                out += '\n' + indent.repeat(depth);
                i++;
                continue;
            }

            if (ch === ':') {
                out += ': ';
                i++;
                // skip following space
                while (i < len && src[i] === ' ') i++;
                continue;
            }

            // Regular character
            out += ch;
            i++;
        }

        // Clean up: collapse multiple blank lines
        return out.replace(/\n{3,}/g, '\n\n').trim();
    }

    function minifyGraphQL(src) {
        let out = '';
        let i = 0;
        const len = src.length;
        let inString = false;
        let inComment = false;
        let inBlockString = false;

        while (i < len) {
            const ch = src[i];

            if (!inString && !inComment && src.slice(i, i+3) === '"""') {
                if (inBlockString) { out += '"""'; inBlockString = false; i += 3; }
                else { out += '"""'; inBlockString = true; i += 3; }
                continue;
            }
            if (inBlockString) { out += ch; i++; continue; }

            if (ch === '"' && !inComment) { inString = !inString; out += ch; i++; continue; }
            if (inString) {
                if (ch === '\\') { out += ch + (src[i+1] || ''); i += 2; continue; }
                out += ch; i++; continue;
            }

            if (ch === '#' && !inString) { inComment = true; i++; continue; }
            if (inComment) { if (ch === '\n') inComment = false; i++; continue; }

            if (ch === '\n' || ch === '\r' || ch === '\t') {
                if (out.length && out[out.length-1] !== ' ') out += ' ';
                i++; continue;
            }
            if (ch === ' ') {
                if (out.length && out[out.length-1] !== ' ' && out[out.length-1] !== '{' && out[out.length-1] !== '(' && out[out.length-1] !== ',') out += ' ';
                i++; continue;
            }
            if (ch === ',') {
                // Remove comma, ensure space
                if (out.length && out[out.length-1] !== ' ') out += ' ';
                i++; continue;
            }

            out += ch; i++;
        }

        return out.replace(/\s+/g, ' ').replace(/\{ /g, '{').replace(/ \}/g, '}').trim();
    }

    function formatGQL() {
        const src = document.getElementById('inputArea').value;
        if (!src.trim()) { showToast('入力がありません'); return; }
        const indentSize = parseInt(document.getElementById('indentSize').value, 10);
        try {
            const result = formatGraphQL(src, indentSize);
            document.getElementById('outputArea').value = result;
            document.getElementById('outputStats').textContent = `文字数: ${result.length.toLocaleString()} (入力: ${src.length.toLocaleString()})`;
            detectType();
        } catch(e) {
            showToast('整形エラー: ' + e.message);
        }
    }

    function minifyGQL() {
        const src = document.getElementById('inputArea').value;
        if (!src.trim()) { showToast('入力がありません'); return; }
        try {
            const result = minifyGraphQL(src);
            document.getElementById('outputArea').value = result;
            document.getElementById('outputStats').textContent = `文字数: ${result.length.toLocaleString()} (入力: ${src.length.toLocaleString()}, ${Math.round((1 - result.length/src.length)*100)}% 削減)`;
        } catch(e) {
            showToast('圧縮エラー: ' + e.message);
        }
    }

    function copyOutput() {
        const out = document.getElementById('outputArea').value;
        if (!out) { showToast('出力がありません'); return; }
        copyText(out);
    }

    document.getElementById('inputArea').addEventListener('input', function() {
        updateInputStats();
        detectType();
    });
    </script>
