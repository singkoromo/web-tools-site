    <div class="toast" id="toast"></div>
    <script>
    function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';setTimeout(()=>{t.style.display='none';},2000);}
    function copyText(text){navigator.clipboard.writeText(text).then(()=>showToast('コピーしました')).catch(()=>{const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('コピーしました');});}

    const SAMPLE_YAML = `openapi: 3.0.0
info:
  title: Sample API
  version: 1.0.0
  description: A sample API
paths:
  /users:
    get:
      summary: Get users
      operationId: getUsers
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
  /users/{id}:
    get:
      summary: Get user by ID
      operationId: getUserById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: Not found
components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string`;

    function loadExample() {
        document.getElementById('specInput').value = SAMPLE_YAML;
        showToast('サンプルを読み込みました');
    }

    function clearAll() {
        document.getElementById('specInput').value = '';
        document.getElementById('resultPanel').innerHTML = '<div class="empty-result">仕様書を入力して「検証する」をクリックしてください</div>';
    }

    function parseSpec(text) {
        // Try JSON first
        try {
            return { data: JSON.parse(text), format: 'JSON' };
        } catch(e) {}
        // Try YAML
        try {
            if (typeof jsyaml !== 'undefined') {
                return { data: jsyaml.load(text), format: 'YAML' };
            }
        } catch(e) {
            return { error: 'YAML解析エラー: ' + e.message };
        }
        return { error: 'JSON/YAML として解析できませんでした' };
    }

    function countOps(paths) {
        if (!paths || typeof paths !== 'object') return 0;
        const httpMethods = ['get','post','put','patch','delete','options','head','trace'];
        let count = 0;
        Object.values(paths).forEach(pathItem => {
            if (typeof pathItem === 'object') {
                httpMethods.forEach(m => { if (pathItem[m]) count++; });
            }
        });
        return count;
    }

    function resolveRef(ref, spec) {
        if (!ref || !ref.startsWith('#/')) return null;
        const parts = ref.slice(2).split('/');
        let cur = spec;
        for (const p of parts) {
            if (cur == null || typeof cur !== 'object') return null;
            cur = cur[decodeURIComponent(p.replace(/~1/g, '/').replace(/~0/g, '~'))];
        }
        return cur;
    }

    function findRefs(obj, refs, visited = new Set()) {
        if (!obj || typeof obj !== 'object') return;
        const key = JSON.stringify(obj).slice(0, 50);
        if (visited.has(key)) return;
        visited.add(key);
        if (obj['$ref']) refs.push(obj['$ref']);
        Object.values(obj).forEach(v => findRefs(v, refs, visited));
    }

    function validate() {
        const text = document.getElementById('specInput').value.trim();
        if (!text) { showToast('仕様書を入力してください'); return; }

        const parsed = parseSpec(text);
        const panel = document.getElementById('resultPanel');
        const errors = [];
        const warnings = [];
        const infos = [];

        if (parsed.error) {
            panel.innerHTML = `<div class="status-banner status-fail"><span class="status-icon">❌</span> 解析失敗</div>
            <ul class="issue-list"><li class="issue-error">${escHtml(parsed.error)}</li></ul>`;
            return;
        }

        const spec = parsed.data;
        const format = parsed.format;

        // Detect version
        let version = 'unknown';
        let isOpenAPI3 = false;
        let isSwagger2 = false;

        if (spec.openapi && String(spec.openapi).startsWith('3')) {
            isOpenAPI3 = true; version = `OpenAPI ${spec.openapi}`;
            // Required: openapi, info, paths
            if (!spec.info) errors.push('必須フィールド "info" が見つかりません');
            else {
                if (!spec.info.title) errors.push('"info.title" が見つかりません');
                if (!spec.info.version) errors.push('"info.version" が見つかりません');
            }
            if (!spec.paths) errors.push('必須フィールド "paths" が見つかりません');
        } else if (spec.swagger && String(spec.swagger).startsWith('2')) {
            isSwagger2 = true; version = `Swagger ${spec.swagger}`;
            if (!spec.info) errors.push('必須フィールド "info" が見つかりません');
            else {
                if (!spec.info.title) errors.push('"info.title" が見つかりません');
                if (!spec.info.version) errors.push('"info.version" が見つかりません');
            }
            if (!spec.paths) errors.push('必須フィールド "paths" が見つかりません');
            if (!spec.host) warnings.push('"host" フィールドがありません（任意ですが推奨）');
        } else {
            errors.push('"openapi" または "swagger" フィールドが見つかりません。バージョンを特定できません。');
        }

        // Check paths
        const paths = spec.paths || {};
        const pathCount = Object.keys(paths).length;
        const opCount = countOps(paths);
        const httpMethods = ['get','post','put','patch','delete','options','head','trace'];

        Object.entries(paths).forEach(([path, pathItem]) => {
            if (!path.startsWith('/')) warnings.push(`パス "${path}" は "/" で始まる必要があります`);
            if (!pathItem || typeof pathItem !== 'object') return;
            httpMethods.forEach(method => {
                const op = pathItem[method];
                if (!op) return;
                if (!op.operationId) warnings.push(`${method.toUpperCase()} ${path}: "operationId" がありません`);
                if (!op.summary && !op.description) warnings.push(`${method.toUpperCase()} ${path}: "summary" または "description" がありません`);
                if (!op.responses || Object.keys(op.responses).length === 0) errors.push(`${method.toUpperCase()} ${path}: "responses" が定義されていません`);
            });
        });

        // Count schemas
        let schemaCount = 0;
        if (isOpenAPI3 && spec.components && spec.components.schemas) {
            schemaCount = Object.keys(spec.components.schemas).length;
        } else if (isSwagger2 && spec.definitions) {
            schemaCount = Object.keys(spec.definitions).length;
        }

        // Check $ref references resolve
        const refs = [];
        findRefs(spec, refs);
        const internalRefs = refs.filter(r => r.startsWith('#/'));
        const brokenRefs = [];
        internalRefs.forEach(ref => {
            const resolved = resolveRef(ref, spec);
            if (resolved === null || resolved === undefined) brokenRefs.push(ref);
        });
        brokenRefs.forEach(ref => errors.push(`未解決の $ref: ${ref}`));

        if (errors.length === 0) infos.push(`フォーマット: ${format} | バージョン: ${version}`);
        else infos.push(`フォーマット: ${format} | バージョン: ${version}`);

        const pass = errors.length === 0;

        let html = `<div class="status-banner ${pass ? 'status-pass' : 'status-fail'}">
            <span class="status-icon">${pass ? '✅' : '❌'}</span>
            ${pass ? '検証合格（Valid）' : `検証失敗 — ${errors.length}件のエラーがあります`}
        </div>`;

        html += `<div class="summary-grid">
            <div class="summary-card"><div class="val">${pathCount}</div><div class="key">パス数</div></div>
            <div class="summary-card"><div class="val">${opCount}</div><div class="key">オペレーション数</div></div>
            <div class="summary-card"><div class="val">${schemaCount}</div><div class="key">スキーマ数</div></div>
            <div class="summary-card"><div class="val">${internalRefs.length}</div><div class="key">$ref 参照数</div></div>
        </div>`;

        if (infos.length > 0) {
            html += '<ul class="issue-list">';
            infos.forEach(i => { html += `<li class="issue-info">${escHtml(i)}</li>`; });
            html += '</ul>';
        }

        if (errors.length > 0) {
            html += '<div style="font-weight:600;color:#c33;margin:0.75rem 0 0.4rem;">エラー</div><ul class="issue-list">';
            errors.forEach(e => { html += `<li class="issue-error">❌ ${escHtml(e)}</li>`; });
            html += '</ul>';
        }

        if (warnings.length > 0) {
            html += '<div style="font-weight:600;color:#856404;margin:0.75rem 0 0.4rem;">警告</div><ul class="issue-list">';
            warnings.forEach(w => { html += `<li class="issue-warning">⚠️ ${escHtml(w)}</li>`; });
            html += '</ul>';
        }

        panel.innerHTML = html;
    }

    function escHtml(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function copyFormatted() {
        const text = document.getElementById('specInput').value.trim();
        if (!text) { showToast('入力がありません'); return; }
        const parsed = parseSpec(text);
        if (parsed.error) { showToast('解析できませんでした'); return; }
        try {
            const formatted = JSON.stringify(parsed.data, null, 2);
            copyText(formatted);
        } catch(e) { showToast('コピーに失敗しました'); }
    }
    </script>
